<!-- ===================================
     LAYOUT
     =================================== -->
<div class="sidebar-overlay" id="overlay"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- HOVEDINNHOLD -->
  <main class="main">
    <style>
      .ml-statbar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
      .ml-stat { background:rgba(255,255,255,0.7); border:1px solid var(--line); border-radius:var(--r-md); padding:12px 18px; box-shadow:var(--shadow-sm); }
      .ml-stat .lbl { font-size:12px; color:var(--ink-muted); font-weight:600; }
      .ml-stat .val { font-size:20px; font-weight:800; color:var(--ink); margin-top:2px; }
      .ml-top { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
      .ml-top .count { font-size:13px; color:var(--ink-muted); font-weight:600; }
      .ml-cta { background:var(--btn-yellow); color:var(--ink); font-weight:700; font-size:13px; padding:10px 18px; border-radius:var(--r-pill); }
      .ml-cta:hover { background:var(--btn-yellow-hover); }
      .ml-state { background:rgba(255,255,255,0.7); border:1px solid var(--line); border-radius:var(--r-lg); padding:22px; box-shadow:var(--shadow-sm); font-size:14px; color:var(--ink-soft); }
      .ml-state strong { color:var(--ink); }
      .ml-state code { background:var(--cream-deep); padding:2px 7px; border-radius:8px; font-size:13px; }
      .ml-list { display:flex; flex-direction:column; gap:12px; }
      .ml-row { display:flex; align-items:center; gap:18px; background:rgba(255,255,255,0.7); border:1px solid var(--line); border-radius:var(--r-lg); padding:18px 20px; box-shadow:var(--shadow-sm); flex-wrap:wrap; }
      .ml-icon { width:42px; height:42px; border-radius:var(--r-md); background:var(--pink-soft); display:flex; align-items:center; justify-content:center; font-size:20px; flex:0 0 auto; }
      .ml-main { flex:1 1 220px; min-width:0; }
      .ml-main .name { font-size:15px; font-weight:700; }
      .ml-main .meta { font-size:12px; color:var(--ink-muted); margin-top:2px; }
      .ml-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:var(--r-pill); }
      .ml-badge.sent { background:rgba(58,157,78,0.14); color:#2f7d40; }
      .ml-badge.draft { background:var(--cream-deep); color:var(--ink-muted); }
    </style>

    <div class="page-header">
      <h1 data-edit="ph-title">Email</h1>
      <p data-edit="ph-sub">E-postkampanjer og nyhetsbrev, hentet direkte fra MailerLite-kontoen din.</p>
    </div>

    <div class="ml-statbar">
      <div class="ml-stat"><div class="lbl">Abonnenter</div><div class="val" id="subCount">…</div></div>
    </div>

    <div class="ml-top">
      <span class="count" id="campCount">Laster …</span>
      <a href="https://dashboard.mailerlite.com/campaigns" target="_blank" rel="noopener" class="ml-cta">Ny kampanje i MailerLite ↗</a>
    </div>

    <div id="campBody"><div class="ml-state">Henter kampanjer fra MailerLite …</div></div>

    <title>Email — LME Creative Academy</title>

    </style>
<script>
  // Sidebar toggle (mobil)
  const burger = document.getElementById('burger');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  }

  burger.addEventListener('click', openSidebar);
  overlay.addEventListener('click', closeSidebar);

  // Lukk sidebar når man klikker en aktiv lenke på mobil
  document.querySelectorAll('.sidebar-item:not(.disabled)').forEach(item => {
    item.addEventListener('click', () => {
      if (window.innerWidth <= 1024) closeSidebar();
    });
  });

  // Active state-håndtering
  document.querySelectorAll('.sidebar-item:not(.disabled)').forEach(item => {
    item.addEventListener('click', function(e) {
      // Bare for ankerlenker (interne) — la ekstern lenke gå som vanlig
      if (this.getAttribute('href')?.startsWith('#')) {
        document.querySelectorAll('.sidebar-item.active').forEach(a => a.classList.remove('active'));
        this.classList.add('active');
      }
    });
  });

  // Kom i gang-sjekkliste: fremdrift + lagring i nettleseren
  (function () {
    const card = document.querySelector('[data-setup]');
    if (!card) return;
    const KEY = 'lme_setup_steps';
    const steps = Array.from(card.querySelectorAll('.setup-step'));
    const fill = card.querySelector('[data-setup-fill]');
    const count = card.querySelector('[data-setup-count]');
    const pct = card.querySelector('[data-setup-pct]');
    let done;
    try { done = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { done = {}; }

    function render() {
      let n = 0;
      steps.forEach(step => {
        const isDone = !!done[step.dataset.step];
        step.classList.toggle('done', isDone);
        if (isDone) n++;
      });
      const total = steps.length;
      const p = Math.round((n / total) * 100);
      fill.style.width = p + '%';
      count.textContent = n + ' av ' + total + ' fullført';
      pct.textContent = p + '%';
      card.classList.toggle('all-done', n === total);
    }

    steps.forEach(step => {
      step.querySelector('.setup-check').addEventListener('click', () => {
        done[step.dataset.step] = !done[step.dataset.step];
        try { localStorage.setItem(KEY, JSON.stringify(done)); } catch (e) {}
        render();
      });
    });

    render();
  })();
</script>

  <script src="/js/page-editor.js" defer></script>
</body>
</html>
