<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF7F0">
<meta name="robots" content="noindex">
<title>Takk for kjøpet · Mia &amp; Teo Skoledagbok</title>
<link rel="icon" href="/images/lme-logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700;800&display=swap');
  @font-face {
    font-family: 'Sasson Montessori';
    src: url('/fonts/SassoonMontessori.woff2') format('woff2'),
         url('/fonts/SassoonMontessori.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  :root{
    --lime:#A4D233; --lime-soft:#E8F5D1; --cerise:#E91E89; --cerise-soft:#FCE3F1;
    --sun:#F7C72E; --sun-soft:#FFF4D6; --sky:#3FA9F5; --bg:#FBF7F0; --bg2:#FFFFFF;
    --ink:#1F1B24; --ink-soft:#5A5560; --ink-muted:#938E99; --line:rgba(31,27,36,.08);
    --r-md:18px; --r-xl:36px; --r-pill:999px; --shadow-lg:0 22px 60px rgba(31,27,36,.10);
    --font: 'Sasson Montessori', 'Playpen Sans', system-ui, sans-serif;
    --font-head: 'Playpen Sans', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
    background:radial-gradient(900px 520px at 50% -10%,var(--lime-soft) 0%,transparent 55%),
      radial-gradient(700px 460px at 100% 100%,var(--sun-soft) 0%,transparent 55%),
      radial-gradient(700px 460px at 0% 90%,var(--cerise-soft) 0%,transparent 55%),var(--bg);
    min-height:100vh;display:flex;align-items:center;justify-content:center}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .wrap{max-width:620px;width:100%;padding:40px 24px;text-align:center}
  .brandbar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px}
  .brandbar img{height:34px}
  .brandbar .bn{font-weight:700;font-size:15px}
  .seal{width:84px;height:84px;margin:0 auto 20px;border-radius:50%;
    background:linear-gradient(135deg,var(--lime),#7fae1f);display:flex;align-items:center;justify-content:center;
    box-shadow:0 16px 36px rgba(127,174,31,.35);animation:pop .5s cubic-bezier(.18,.89,.32,1.28) both}
  .seal svg{width:42px;height:42px;color:#fff}
  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .chip{display:inline-block;background:var(--lime-soft);color:#5b7d12;font-size:12.5px;font-weight:700;
    letter-spacing:.03em;padding:6px 15px;border-radius:var(--r-pill);margin-bottom:16px}
  h1{font-size:clamp(25px,4.6vw,33px);font-weight:800;line-height:1.15;letter-spacing:-.02em;margin-bottom:12px}
  .lead{font-size:16px;color:var(--ink-soft);max-width:470px;margin:0 auto 26px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-xl);
    box-shadow:var(--shadow-lg);padding:28px;margin-bottom:22px}
  .pn{font-size:18px;font-weight:800}
  .ps{font-size:13.5px;color:var(--ink-soft);margin:3px 0 18px}
  .cover{display:block;width:160px;max-width:56%;height:auto;margin:2px auto 20px;border-radius:12px;
    box-shadow:0 12px 30px rgba(31,27,36,.18);border:1px solid var(--line)}
  .dl{display:flex;flex-direction:column;gap:12px}
  .dl-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    font-size:15.5px;font-weight:800;padding:15px 20px;border-radius:var(--r-pill);
    background:linear-gradient(120deg,var(--cerise),#ff5fb0);color:#fff;
    box-shadow:0 12px 28px rgba(233,30,137,.28);transition:transform .16s ease,box-shadow .16s ease}
  .dl-btn:hover{transform:translateY(-2px);box-shadow:0 18px 36px rgba(233,30,137,.36)}
  .dl-btn.en{background:linear-gradient(120deg,var(--sky),#7ec6ff);box-shadow:0 12px 28px rgba(63,169,245,.28)}
  .dl-btn .flag{font-size:18px}
  .support{margin-top:24px;font-size:13.5px;color:var(--ink-muted)}
  .back{display:inline-block;margin-top:14px;font-size:14px;font-weight:600;color:var(--ink-muted)}
  .back:hover{color:var(--ink-soft);text-decoration:underline}
  .footer{margin-top:26px;font-size:13px;color:var(--ink-muted)}
  .lang-toggle{position:fixed;top:16px;right:16px;z-index:50;border:1px solid var(--line);background:#fff;
    color:var(--ink);font-family:inherit;font-weight:700;font-size:13px;padding:9px 14px;border-radius:var(--r-pill);
    box-shadow:0 6px 20px rgba(31,27,36,.12);cursor:pointer}

  /* Laast fontregel: Sasson Montessori paa alt unntatt overskrifter */
  h1, h2, h3, h4, h5, h6 { font-family: var(--font-head); }
  button, input, select, textarea { font-family: var(--font); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brandbar">
      <img src="/images/lme-logo.png" alt="LME" onerror="this.style.display='none'">
      <span class="bn">Little Montessori Explorers</span>
    </div>
    <div class="seal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <span class="chip" id="chip"></span>
    <h1 id="heading"></h1>
    <p class="lead" id="lead"></p>

    <div class="card" id="card">
      <div class="pn" id="pname"></div>
      <div class="ps" id="psub"></div>
      <img class="cover" id="cover" alt="">
      <div class="dl" id="downloads"></div>
    </div>

    <p class="support" id="support"></p>
    <a class="back" id="back" href="/butikk"></a>
    <div class="footer">© <span id="yr"></span> Little Montessori Explorers</div>
  </div>

  <script>
    var BOKER = {
      "1-3": {
        navn: { no: "Mia & Teo Skoledagbok — 1.–3. trinn", en: "Mia & Teo School Diary — Grades 1–3" },
        sub:  { no: "358 sider · A5 · 5–9 år", en: "358 pages · A5 · ages 5–9" },
        no_url: "https://github.com/Lmexplorers/lme-platform/releases/download/skoledagbok-pdf/skoledagbok-1-3-no.pdf",
        en_url: "https://github.com/Lmexplorers/lme-platform/releases/download/skoledagbok-pdf/skoledagbok-1-3-en.pdf"
      },
      "4-7": {
        navn: { no: "Mia & Teo Skoledagbok — 4.–7. trinn", en: "Mia & Teo School Diary — Grades 4–7" },
        sub:  { no: "358 sider · A5 · 9–13 år", en: "358 pages · A5 · ages 9–13" },
        no_url: "https://github.com/Lmexplorers/lme-platform/releases/download/skoledagbok-pdf/skoledagbok-4-7-no.pdf",
        en_url: "https://github.com/Lmexplorers/lme-platform/releases/download/skoledagbok-pdf/skoledagbok-4-7-en.pdf"
      }
    };

    var T = {
      no: {
        chip: "Kjøpet er bekreftet",
        heading: "Tusen takk for kjøpet! 🎉",
        lead: "Her er skoledagboka di. Last ned så mange ganger du vil, og lagre fila trygt.",
        nob: "Last ned (norsk PDF)", enb: "Download (English PDF)",
        support: "Spørsmål? Svar på kvitteringen fra Stripe, så hjelper vi deg.",
        back: "← Tilbake til butikken",
        mangler_h: "Fant ikke kjøpet",
        mangler_l: "Vi fant ikke produktet for denne lenken. Gå tilbake til butikken, eller svar på Stripe-kvitteringen din, så hjelper vi deg."
      },
      en: {
        chip: "Purchase confirmed",
        heading: "Thank you for your purchase! 🎉",
        lead: "Here is your school diary. Download as many times as you like, and keep the file safe.",
        nob: "Last ned (norsk PDF)", enb: "Download (English PDF)",
        support: "Questions? Reply to your Stripe receipt and we'll help you.",
        back: "← Back to the shop",
        mangler_h: "Purchase not found",
        mangler_l: "We couldn't find the product for this link. Go back to the shop, or reply to your Stripe receipt and we'll help you."
      }
    };

    var params = new URLSearchParams(location.search);
    var LANG = (params.get('lang') || localStorage.getItem('lme_lang') || 'no').toLowerCase();
    if (LANG !== 'en' && LANG !== 'no') LANG = 'no';
    var P = params.get('p');
    var bok = P && BOKER[P];

    function txt(id, v){ var el = document.getElementById(id); if (el) el.textContent = v; }

    function render(){
      var t = T[LANG];
      document.documentElement.lang = LANG;
      txt('yr', new Date().getFullYear());
      txt('chip', t.chip);
      txt('support', t.support);
      var back = document.getElementById('back'); back.textContent = t.back;

      if (!bok){
        document.getElementById('chip').style.display = 'none';
        txt('heading', t.mangler_h);
        txt('lead', t.mangler_l);
        document.getElementById('card').style.display = 'none';
        return;
      }
      txt('heading', t.heading);
      txt('lead', t.lead);
      txt('pname', bok.navn[LANG] || bok.navn.no);
      txt('psub', bok.sub[LANG] || bok.sub.no);

      var cover = document.getElementById('cover');
      cover.onerror = function(){ this.style.display = 'none'; };
      cover.style.display = '';
      cover.src = '/images/skoledagbok/cover-' + P + '-' + LANG + '.png';
      cover.alt = (bok.navn[LANG] || bok.navn.no) + ' — forside';

      var dl = document.getElementById('downloads');
      dl.innerHTML = '';
      var url   = LANG === 'en' ? bok.en_url : bok.no_url;
      var label = LANG === 'en' ? t.enb : t.nob;
      var flag  = LANG === 'en' ? '🇬🇧' : '🇳🇴';
      var a = document.createElement('a');
      a.className = 'dl-btn' + (LANG === 'en' ? ' en' : '');
      a.href = url; a.target = '_blank'; a.rel = 'noopener';
      a.innerHTML = '<span class="flag">' + flag + '</span><span>' + label + '</span>';
      dl.appendChild(a);
    }
    render();
  </script>
<script src="/js/lme-visibility.js" defer></script>
<script src="/js/lme-account.js?v=4" defer></script>
<script src="/js/renate-widget.js?v=3" defer></script>
</body>
</html>
