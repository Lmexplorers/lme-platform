<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF7F0">
<title>Mia &amp; Teo Skoledagbok 2026/2027 · LME</title>
<link rel="icon" href="/images/lme-logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700;800&display=swap');
  :root{
    --lime:#A4D233; --lime-soft:#E8F5D1; --cerise:#E91E89; --cerise-soft:#FCE3F1;
    --sun:#F7C72E; --sun-soft:#FFF4D6; --sky:#3FA9F5; --sky-soft:#DCEEFE;
    --bg:#FBF7F0; --bg2:#FFFFFF; --ink:#1F1B24; --ink-soft:#5A5560; --ink-muted:#938E99;
    --line:rgba(31,27,36,.08); --r-md:18px; --r-lg:26px; --r-xl:36px; --r-pill:999px;
    --shadow-lg:0 22px 60px rgba(31,27,36,.10);
    --font:'Playpen Sans','Comic Sans MS',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
    background:radial-gradient(900px 520px at 50% -10%,var(--lime-soft) 0%,transparent 55%),
      radial-gradient(700px 460px at 100% 100%,var(--sun-soft) 0%,transparent 55%),
      radial-gradient(700px 460px at 0% 90%,var(--cerise-soft) 0%,transparent 55%),var(--bg);
    min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:920px;margin:0 auto;padding:46px 22px 64px}
  .brandbar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:26px}
  .brandbar img{height:38px}
  .brandbar .bn{font-weight:700;font-size:15px}
  .hero{text-align:center;margin-bottom:40px}
  .hero .chip{display:inline-block;background:var(--lime-soft);color:#5b7d12;font-size:12.5px;font-weight:700;
    letter-spacing:.03em;padding:6px 15px;border-radius:var(--r-pill);margin-bottom:16px}
  .hero h1{font-size:clamp(28px,5.2vw,40px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:12px}
  .hero h1 .a{color:var(--cerise)} .hero h1 .b{color:var(--lime)} .hero h1 .c{color:var(--sky)}
  .hero .lead{font-size:16px;color:var(--ink-soft);max-width:600px;margin:0 auto}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .book{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);
    overflow:hidden;display:flex;flex-direction:column}
  .book .top{padding:30px 26px 22px;color:#fff;position:relative}
  .book.b1 .top{background:linear-gradient(135deg,var(--cerise),#ff7ec0)}
  .book.b2 .top{background:linear-gradient(135deg,var(--sky),#7ec6ff)}
  .book .badge{display:inline-block;background:rgba(255,255,255,.22);font-size:12px;font-weight:700;
    padding:5px 12px;border-radius:var(--r-pill);margin-bottom:12px}
  .book .bt{font-weight:800;font-size:14px;opacity:.95}
  .book .bn{font-weight:800;font-size:26px;line-height:1.05;margin:2px 0 6px}
  .book .bm{font-size:13.5px;opacity:.95}
  .book .body{padding:22px 26px 26px;display:flex;flex-direction:column;gap:11px}
  .book .meta{font-size:13.5px;color:var(--ink-soft);margin-bottom:4px}
  .dl{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;font-size:15px;font-weight:800;
    padding:14px 18px;border-radius:var(--r-pill);transition:transform .16s ease,box-shadow .16s ease}
  .dl .flag{font-size:18px}
  .dl.no{background:linear-gradient(120deg,var(--cerise),#ff5fb0);color:#fff;box-shadow:0 12px 26px rgba(233,30,137,.26)}
  .dl.en{background:linear-gradient(120deg,var(--sky),#7ec6ff);color:#fff;box-shadow:0 12px 26px rgba(63,169,245,.26)}
  .dl:hover{transform:translateY(-2px)}
  .note{margin-top:34px;text-align:center;font-size:13.5px;color:var(--ink-muted);max-width:620px;margin-left:auto;margin-right:auto}
  .foot{margin-top:30px;text-align:center}
  .back{display:inline-block;font-size:14px;font-weight:600;color:var(--ink-muted)}
  .back:hover{color:var(--ink-soft);text-decoration:underline}
  .copyright{margin-top:14px;font-size:13px;color:var(--ink-muted);text-align:center}
  .lang-toggle{position:fixed;top:16px;right:16px;z-index:50;border:1px solid var(--line);background:#fff;
    color:var(--ink);font-family:inherit;font-weight:700;font-size:13px;padding:9px 14px;border-radius:var(--r-pill);
    box-shadow:0 6px 20px rgba(31,27,36,.12);cursor:pointer}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brandbar">
      <img src="/images/lme-logo.png" alt="LME" onerror="this.style.display='none'">
      <span class="bn">Little Montessori Explorers</span>
    </div>

    <div class="hero">
      <span class="chip" id="chip"></span>
      <h1><span class="a">Mia</span> <span class="b">&amp;</span> <span class="c">Teo</span> <span id="htitle"></span></h1>
      <p class="lead" id="lead"></p>
    </div>

    <div class="grid">
      <article class="book b1">
        <div class="top">
          <span class="badge" id="b1badge"></span>
          <div class="bt" id="b1trinn"></div>
          <div class="bn">Mia &amp; Teo</div>
          <div class="bm" id="b1alder"></div>
        </div>
        <div class="body">
          <div class="meta" id="b1meta"></div>
          <a class="dl no" id="b1no"><span class="flag">🇳🇴</span><span></span></a>
          <a class="dl en" id="b1en"><span class="flag">🇬🇧</span><span></span></a>
        </div>
      </article>

      <article class="book b2">
        <div class="top">
          <span class="badge" id="b2badge"></span>
          <div class="bt" id="b2trinn"></div>
          <div class="bn">Mia &amp; Teo</div>
          <div class="bm" id="b2alder"></div>
        </div>
        <div class="body">
          <div class="meta" id="b2meta"></div>
          <a class="dl no" id="b2no"><span class="flag">🇳🇴</span><span></span></a>
          <a class="dl en" id="b2en"><span class="flag">🇬🇧</span><span></span></a>
        </div>
      </article>
    </div>

    <p class="note" id="note"></p>
    <div class="foot"><a class="back" id="back" href="/butikk"></a></div>
    <div class="copyright">© <span id="yr"></span> Little Montessori Explorers</div>
  </div>

  <script>
    // Google Drive direkte-nedlasting via usercontent-endepunktet med confirm=t,
    // som hopper over "kan ikke skanne for virus"-mellomsiden for store filer.
    // (Krever at filene er delt "Alle med lenken".)
    var DRIVE = function(id){ return "https://drive.usercontent.google.com/download?id=" + id + "&export=download&confirm=t"; };
    var FILES = {
      b1no: "1v9QsJCtOgD5vaKBV4iOex278PSbr9z1B",
      b1en: "1bePd9HK3CUfmf-HMIn6aKOQzVkt52G4q",
      b2no: "1ohjn77TI_RgNV3EYkWDLnB_YVg2IIKvU",
      b2en: "13WqVhd35ush-jiHwS4HiJxHcADvEeBJJ"
    };

    var T = {
      no: {
        chip: "Gratis nedlasting · PDF",
        htitle: "Skoledagbok",
        lead: "En side per dag gjennom hele skoleåret 2026/2027. Laget i Montessori-ånd: vi spør om dagen og undringen, ikke om karakterer. A5, klar til å skrive ut eller fylle ut digitalt.",
        b1trinn: "Skoledagbok", b1alder: "1.–3. trinn · 5–9 år",
        b2trinn: "Skoledagbok", b2alder: "4.–7. trinn · 9–13 år",
        badge1: "De yngste", badge2: "De litt eldre",
        meta: "358 sider · A5 stående · norsk + engelsk",
        no: "Last ned (norsk PDF)", en: "Download (English PDF)",
        note: "Tips: PDF-ene er store (opptil ~43 MB). På mobil lastes de ned i bakgrunnen. Trykte spiralbøker kommer i salg før skolestart.",
        back: "← Tilbake til butikken"
      },
      en: {
        chip: "Free download · PDF",
        htitle: "School Diary",
        lead: "One page a day through the whole 2026/2027 school year. Made the Montessori way: we ask about the day and the wonder, not about grades. A5, ready to print or fill in digitally.",
        b1trinn: "School Diary", b1alder: "Grades 1–3 · ages 5–9",
        b2trinn: "School Diary", b2alder: "Grades 4–7 · ages 9–13",
        badge1: "The youngest", badge2: "A bit older",
        meta: "358 pages · A5 portrait · Norwegian + English",
        no: "Last ned (norsk PDF)", en: "Download (English PDF)",
        note: "Note: the PDFs are large (up to ~43 MB). On mobile they download in the background. Printed spiral books go on sale before the school year starts.",
        back: "← Back to the shop"
      }
    };

    var params = new URLSearchParams(location.search);
    var LANG = (params.get('lang') || localStorage.getItem('lme_lang') || 'no').toLowerCase();
    if (LANG !== 'en' && LANG !== 'no') LANG = 'no';

    function setText(id, v){ var el = document.getElementById(id); if (el) el.textContent = v; }
    function setBtn(id, label, fileId){
      var a = document.getElementById(id);
      a.href = DRIVE(fileId);
      a.querySelector('span:last-child').textContent = label;
    }

    function render(){
      var t = T[LANG];
      document.documentElement.lang = LANG;
      setText('yr', new Date().getFullYear());
      setText('chip', t.chip);
      setText('htitle', t.htitle);
      setText('lead', t.lead);
      setText('b1badge', t.badge1); setText('b1trinn', t.b1trinn); setText('b1alder', t.b1alder); setText('b1meta', t.meta);
      setText('b2badge', t.badge2); setText('b2trinn', t.b2trinn); setText('b2alder', t.b2alder); setText('b2meta', t.meta);
      setBtn('b1no', t.no, FILES.b1no); setBtn('b1en', t.en, FILES.b1en);
      setBtn('b2no', t.no, FILES.b2no); setBtn('b2en', t.en, FILES.b2en);
      var back = document.getElementById('back'); back.textContent = t.back;
    }
    render();

    (function(){
      var b = document.createElement('button');
      b.className = 'lang-toggle';
      b.textContent = LANG === 'en' ? '🇳🇴 Norsk' : '🇬🇧 English';
      b.addEventListener('click', function(){
        LANG = LANG === 'en' ? 'no' : 'en';
        try { localStorage.setItem('lme_lang', LANG); } catch(e){}
        b.textContent = LANG === 'en' ? '🇳🇴 Norsk' : '🇬🇧 English';
        render();
      });
      document.body.appendChild(b);
    })();
  </script>
</body>
</html>
