<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F8D7DA">
<title>Logg inn — Little Montessori Explorers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<title>Logg inn — Little Montessori Explorers</title>
</head>
<body>
  <header class="lg-header">
    <a href="/dashboard" class="lg-logo">LME</a>
  </header>

  <main class="lg-wrap">
    <div class="lg-card">
      <h1 class="lg-title" id="lgTitle">Velkommen <em>tilbake</em></h1>
      <p class="lg-sub" id="lgSub">Logg inn for å fortsette til Little Montessori Explorers.</p>

      <div class="lg-tabs" role="tablist">
        <button class="lg-tab active" id="tabLogin" type="button">Logg inn</button>
        <button class="lg-tab" id="tabSignup" type="button">Opprett konto</button>
      </div>

      <form id="authForm" novalidate>
        <div class="lg-field" id="nameField" style="display:none;">
          <label for="name">Navn</label>
          <input type="text" id="name" name="name" autocomplete="name" placeholder="Fornavn">
        </div>
        <div class="lg-field">
          <label for="email">E-post</label>
          <input type="email" id="email" name="email" autocomplete="email" placeholder="deg@eksempel.no" required>
        </div>
        <div class="lg-field">
          <label for="password">Passord</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Minst 6 tegn" required>
        </div>
        <button class="lg-btn" id="submitBtn" type="submit">Logg inn</button>
      </form>

      <div class="lg-alt">
        <button class="lg-link" id="forgotBtn" type="button">Glemt passord?</button>
      </div>

      <div class="lg-divider">eller</div>

      <button class="lg-btn" id="magicBtn" type="button" style="background:var(--pink-soft);">
        Send meg en innloggingslenke
      </button>

      <div class="lg-msg" id="msg" role="status"></div>
    </div>
  </main>

  <footer class="lg-foot">
    Trenger du hjelp? <a href="/help">Kontakt oss</a>
  </footer>

  <title>Logg inn — Little Montessori Explorers</title>
  <script src="/js/lme-auth.js"></script>
  <script>
    (function () {
      'use strict';

      var mode = 'login'; // 'login' | 'signup'
      var params = new URLSearchParams(location.search);
      var next = params.get('next') || '/dashboard';
      // Hindre open-redirect: bare interne stier tillatt
      if (!/^\/[^\/]/.test(next)) next = '/dashboard';

      var els = {
        title: document.getElementById('lgTitle'),
        sub: document.getElementById('lgSub'),
        tabLogin: document.getElementById('tabLogin'),
        tabSignup: document.getElementById('tabSignup'),
        nameField: document.getElementById('nameField'),
        form: document.getElementById('authForm'),
        email: document.getElementById('email'),
        password: document.getElementById('password'),
        name: document.getElementById('name'),
        submitBtn: document.getElementById('submitBtn'),
        forgotBtn: document.getElementById('forgotBtn'),
        magicBtn: document.getElementById('magicBtn'),
        msg: document.getElementById('msg')
      };

      function showMsg(text, type) {
        els.msg.textContent = text;
        els.msg.className = 'lg-msg show ' + type;
      }
      function clearMsg() { els.msg.className = 'lg-msg'; }

      function setMode(next_mode) {
        mode = next_mode;
        var isSignup = mode === 'signup';
        els.tabLogin.classList.toggle('active', !isSignup);
        els.tabSignup.classList.toggle('active', isSignup);
        els.nameField.style.display = isSignup ? 'block' : 'none';
        els.title.innerHTML = isSignup ? 'Opprett <em>konto</em>' : 'Velkommen <em>tilbake</em>';
        els.sub.textContent = isSignup
          ? 'Lag en konto for å komme i gang.'
          : 'Logg inn for å fortsette til Little Montessori Explorers.';
        els.submitBtn.textContent = isSignup ? 'Opprett konto' : 'Logg inn';
        els.password.setAttribute('autocomplete', isSignup ? 'new-password' : 'current-password');
        clearMsg();
      }

      els.tabLogin.addEventListener('click', function () { setMode('login'); });
      els.tabSignup.addEventListener('click', function () { setMode('signup'); });

      if (!window.LME) {
        showMsg('Kunne ikke laste innloggingen. Sjekk nettforbindelsen og last siden på nytt.', 'error');
        return;
      }

      // Allerede innlogget? Send videre.
      LME.getSession().then(function (session) {
        if (session) location.replace(next);
      });

      function busy(on) {
        els.submitBtn.disabled = on;
        els.magicBtn.disabled = on;
      }

      els.form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearMsg();
        var email = els.email.value.trim();
        var password = els.password.value;
        if (!email || !password) { showMsg('Fyll inn e-post og passord.', 'error'); return; }
        if (mode === 'signup' && password.length < 6) {
          showMsg('Passordet må være minst 6 tegn.', 'error'); return;
        }
        busy(true);

        var action = mode === 'signup'
          ? LME.signUp(email, password, { full_name: els.name.value.trim() })
          : LME.signIn(email, password);

        action.then(function (res) {
          busy(false);
          if (res.error) { showMsg(translateError(res.error.message), 'error'); return; }
          if (mode === 'signup' && res.data && res.data.user && !res.data.session) {
            showMsg('Konto opprettet! Sjekk e-posten din for å bekrefte før du logger inn.', 'success');
            return;
          }
          location.replace(next);
        }).catch(function () {
          busy(false);
          showMsg('Noe gikk galt. Prøv igjen om litt.', 'error');
        });
      });

      els.magicBtn.addEventListener('click', function () {
        clearMsg();
        var email = els.email.value.trim();
        if (!email) { showMsg('Skriv inn e-posten din først.', 'error'); return; }
        busy(true);
        LME.signInMagicLink(email, location.origin + next).then(function (res) {
          busy(false);
          if (res.error) { showMsg(translateError(res.error.message), 'error'); return; }
          showMsg('Lenke sendt! Sjekk e-posten din for å logge inn.', 'success');
        }).catch(function () {
          busy(false);
          showMsg('Kunne ikke sende lenke. Prøv igjen om litt.', 'error');
        });
      });

      els.forgotBtn.addEventListener('click', function () {
        clearMsg();
        var email = els.email.value.trim();
        if (!email) { showMsg('Skriv inn e-posten din først, så sender vi en lenke.', 'error'); return; }
        busy(true);
        LME.resetPassword(email).then(function (res) {
          busy(false);
          if (res.error) { showMsg(translateError(res.error.message), 'error'); return; }
          showMsg('Vi har sendt deg en lenke for å tilbakestille passordet.', 'success');
        }).catch(function () {
          busy(false);
          showMsg('Kunne ikke sende lenke. Prøv igjen om litt.', 'error');
        });
      });

      function translateError(m) {
        m = (m || '').toLowerCase();
        if (m.indexOf('invalid login') !== -1) return 'Feil e-post eller passord.';
        if (m.indexOf('already registered') !== -1 || m.indexOf('already exists') !== -1) return 'Denne e-posten har allerede en konto. Prøv å logge inn.';
        if (m.indexOf('email not confirmed') !== -1) return 'Bekreft e-posten din først (sjekk innboksen).';
        if (m.indexOf('rate limit') !== -1 || m.indexOf('too many') !== -1) return 'For mange forsøk. Vent litt og prøv igjen.';
        if (m.indexOf('password') !== -1 && m.indexOf('weak') !== -1) return 'Passordet er for svakt. Velg et sterkere passord.';
        return 'Noe gikk galt: ' + m;
      }

      setMode('login');
    })();
  </script>
</body>
</html>
