<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF7F0">
<title>Gratis Montessoristartguide · LME</title>
<link rel="icon" href="/images/lme-logo.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700;800&display=swap');
  @font-face {
    font-family: 'Sasson Montessori';
    src: url('/fonts/SassoonMontessori.woff2') format('woff2'),
         url('/fonts/SassoonMontessori.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }

  :root {
    --lime: #A4D233;
    --lime-soft: #E8F5D1;
    --cerise: #E91E89;
    --cerise-soft: #FCE3F1;
    --sun: #F7C72E;
    --sun-soft: #FFF4D6;
    --bg: #FBF7F0;
    --bg-2: #FFFFFF;
    --ink: #1F1B24;
    --ink-soft: #5A5560;
    --ink-muted: #938E99;
    --line: rgba(31, 27, 36, 0.08);
    --r-md: 18px;
    --r-lg: 26px;
    --r-xl: 36px;
    --r-pill: 999px;
    --shadow-md: 0 6px 26px rgba(31, 27, 36, 0.07);
    --shadow-lg: 0 22px 60px rgba(31, 27, 36, 0.10);
    --font: 'Sasson Montessori', 'Playpen Sans', system-ui, sans-serif;
    --font-head: 'Playpen Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(1100px 600px at 12% -8%, var(--cerise-soft) 0%, transparent 55%),
      radial-gradient(900px 520px at 105% 8%, var(--lime-soft) 0%, transparent 50%),
      radial-gradient(700px 480px at 80% 110%, var(--sun-soft) 0%, transparent 55%),
      var(--bg);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 24px 64px; }

  .brandbar { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
  .brandbar img { height: 36px; width: auto; }
  .brandbar .brandname { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }

  .grid {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 48px;
    align-items: center;
  }

  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--cerise-soft); color: var(--cerise);
    font-size: 12.5px; font-weight: 700;
    padding: 7px 15px; border-radius: var(--r-pill);
    letter-spacing: 0.02em; margin-bottom: 22px;
  }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cerise); }

  h1 {
    font-size: clamp(30px, 4.6vw, 46px);
    font-weight: 800; line-height: 1.12;
    letter-spacing: -0.02em; margin-bottom: 18px;
  }
  h1 .hl {
    background: linear-gradient(120deg, var(--cerise), var(--sun));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .lead { font-size: 17.5px; color: var(--ink-soft); max-width: 540px; margin-bottom: 26px; }

  .bullets { list-style: none; margin: 0 0 30px; display: grid; gap: 13px; }
  .bullets li { display: flex; align-items: flex-start; gap: 12px; font-size: 15.5px; color: var(--ink); }
  .bullets .tick {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    background: var(--lime-soft); color: #5b7d12;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; margin-top: 1px;
  }

  .card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-lg);
    padding: 34px;
  }
  .card .card-media {
    border-radius: var(--r-lg); overflow: hidden;
    margin-bottom: 24px; aspect-ratio: 4 / 3; background: var(--lime-soft);
  }
  .card .card-media img { width: 100%; height: 100%; object-fit: cover; }

  .field { margin-bottom: 14px; }
  .field input {
    width: 100%; font-family: inherit; font-size: 15.5px;
    padding: 15px 18px; border-radius: var(--r-pill);
    border: 1.5px solid var(--line); background: #FCFBFA; color: var(--ink);
    transition: border-color .18s ease, box-shadow .18s ease;
  }
  .field input::placeholder { color: var(--ink-muted); }
  .field input:focus {
    outline: none; border-color: var(--cerise);
    box-shadow: 0 0 0 4px var(--cerise-soft);
  }

  .btn-primary {
    width: 100%; font-size: 16.5px; font-weight: 700;
    padding: 16px 22px; border-radius: var(--r-pill);
    background: linear-gradient(120deg, var(--cerise), #ff5fb0);
    color: #fff; box-shadow: 0 10px 26px rgba(233, 30, 137, 0.30);
    transition: transform .16s ease, box-shadow .16s ease;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(233, 30, 137, 0.36); }
  .btn-primary:active { transform: translateY(0); }

  .reassure { text-align: center; font-size: 13px; color: var(--ink-muted); margin-top: 14px; }
  .reassure svg { width: 13px; height: 13px; vertical-align: -2px; margin-right: 4px; }

  .form-done {
    display: none; text-align: center; padding: 16px 8px;
  }
  .form-done.show { display: block; }
  .form-done .big { font-size: 40px; margin-bottom: 8px; }
  .form-done h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .form-done p { color: var(--ink-soft); font-size: 15px; }

  .footer { text-align: center; margin-top: 56px; font-size: 13px; color: var(--ink-muted); }

  @media (max-width: 880px) {
    .grid { grid-template-columns: 1fr; gap: 34px; }
    .card { order: -1; }
    .card .card-media { aspect-ratio: 16 / 9; }
  }
  @media (max-width: 520px) {
    .wrap { padding: 22px 18px 48px; }
    .card { padding: 24px; }
  }

  /* Laast fontregel: Sasson Montessori paa alt unntatt overskrifter */
  h1, h2, h3, h4, h5, h6 { font-family: var(--font-head); }
  button, input, select, textarea { font-family: var(--font); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brandbar">
      <img id="brandLogo" src="/images/lme-logo.png" alt="LME" onerror="this.style.display='none'">
      <span class="brandname" id="brandName">LME</span>
    </div>

    <div class="grid">
      <!-- Tekst -->
      <div class="col-text">
        <span class="chip"><span class="dot"></span><span id="optLabel"></span></span>
        <h1 id="optHeading"></h1>
        <p class="lead" id="optSub"></p>
        <ul class="bullets" id="optBullets"></ul>
      </div>

      <!-- Skjema -->
      <div class="card">
        <div class="card-media"><img id="optImg" src="" alt=""></div>
        <form id="optForm" novalidate>
          <div class="field"><input id="optName" type="text" autocomplete="given-name"></div>
          <div class="field"><input id="optEmail" type="email" autocomplete="email" required></div>
          <button class="btn-primary" type="submit" id="optBtn"></button>
          <p class="reassure">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span id="optSafe"></span>
          </p>
        </form>
        <div class="form-done" id="optDone">
          <div class="big">🎁</div>
          <h3 id="optDoneTitle"></h3>
          <p id="optDoneText"></p>
        </div>
      </div>
    </div>

    <div class="footer">© <span id="yr"></span> <span id="brandFooter">LME</span> · Laget med ro og omtanke 🌿</div>
  </div>

  <script src="funnel-config.js"></script>
  <script>
    // Språk: ?lang=… > localStorage 'lme_lang' (samme som plattformen) > 'no'
    const LANG = (() => {
      const q = new URLSearchParams(location.search).get('lang');
      let l = (q || localStorage.getItem('lme_lang') || 'no').toLowerCase();
      if (l !== 'en' && l !== 'no') l = 'no';
      try { localStorage.setItem('lme_lang', l); } catch (e) {}
      return l;
    })();
    document.documentElement.lang = LANG;
    const C = window.LME_FUNNEL[LANG] || window.LME_FUNNEL.no;

    // Språk-knapp (🇬🇧/🇳🇴) — samme valg som resten av plattformen
    (() => {
      const b = document.createElement('button');
      b.textContent = LANG === 'en' ? '🇳🇴 Norsk' : '🇬🇧 English';
      b.setAttribute('aria-label', 'Bytt språk / Switch language');
      b.style.cssText = 'position:fixed;top:16px;right:16px;z-index:300;display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(31,27,36,.12);background:#fff;color:#1F1B24;font-family:inherit;font-weight:700;font-size:13px;line-height:1;padding:10px 15px;border-radius:999px;box-shadow:0 6px 20px rgba(31,27,36,.12);cursor:pointer;';
      b.addEventListener('click', () => {
        const next = LANG === 'en' ? 'no' : 'en';
        try { localStorage.setItem('lme_lang', next); } catch (e) {}
        const u = new URL(location.href); u.searchParams.set('lang', next); location.href = u.toString();
      });
      document.body.appendChild(b);
    })();
    const o = C.optIn;
    const txt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };

    // Branding
    document.getElementById('brandLogo').src = C.brand.logo;
    txt('brandName', C.brand.kortnavn);
    txt('brandFooter', C.brand.navn);
    txt('yr', new Date().getFullYear());

    // Innhold
    txt('optLabel', o.merkelapp);
    document.getElementById('optHeading').innerHTML = highlightLast(o.overskrift);
    txt('optSub', o.underoverskrift);
    txt('optBtn', o.knapp);
    txt('optSafe', o.sikkerhet);
    txt('optDoneTitle', o.bekreftelseTittel);
    txt('optDoneText', o.bekreftelseTekst);
    document.getElementById('optName').placeholder = o.navnPlaceholder;
    document.getElementById('optEmail').placeholder = o.epostPlaceholder;
    const img = document.getElementById('optImg');
    img.src = o.bilde; img.alt = o.overskrift;

    const ul = document.getElementById('optBullets');
    o.punkter.forEach(p => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="tick">✓</span><span>' + p + '</span>';
      ul.appendChild(li);
    });

    // Fremhev de siste ordene i overskriften for et premium preg
    function highlightLast(str) {
      const words = str.split(' ');
      if (words.length < 3) return str;
      const cut = words.length - 3;
      return words.slice(0, cut).join(' ') + ' <span class="hl">' + words.slice(cut).join(' ') + '</span>';
    }

    // Skjema — fanger e-posten og sender brukeren rett videre til nedlasting av guiden
    document.getElementById('optForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('optEmail').value.trim();
      const name = document.getElementById('optName').value.trim();
      if (!email) { document.getElementById('optEmail').focus(); return; }

      // 1) Lagre lead lokalt så ingen e-post går tapt før e-postverktøyet er koblet på.
      try {
        const leads = JSON.parse(localStorage.getItem('lme_leads') || '[]');
        leads.push({ email, name, lang: LANG, ts: new Date().toISOString() });
        localStorage.setItem('lme_leads', JSON.stringify(leads));
      } catch (err) {}

      // 2) Send til e-postliste/CRM hvis konfigurert (fire-and-forget, så vi kan vise vår egen side).
      if (C.brand.optInActionUrl) {
        try {
          fetch(C.brand.optInActionUrl, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ email, name, lang: LANG })
          });
        } catch (err) {}
      }

      // 3) Bekreft og send videre til siden der gratisguiden lastes ned (tilbud.html).
      this.style.display = 'none';
      document.getElementById('optDone').classList.add('show');
      setTimeout(() => { window.location.href = C.brand.etterOptIn; }, 1500);
    });
  </script>
</body>
</html>
