<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF7F0">
<title>Engangstilbud: AI-guiden · LME</title>
<link rel="icon" href="/images/lme-logo.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700;800&display=swap');
  @font-face {
    font-family: 'Sasson Montessori';
    src: url('/fonts/SassoonMontessori.woff2') format('woff2'),
         url('/fonts/SassoonMontessori.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }

  :root {
    --lime: #A4D233;
    --lime-soft: #E8F5D1;
    --cerise: #E91E89;
    --cerise-soft: #FCE3F1;
    --sun: #F7C72E;
    --sun-soft: #FFF4D6;
    --bg: #FBF7F0;
    --bg-2: #FFFFFF;
    --ink: #1F1B24;
    --ink-soft: #5A5560;
    --ink-muted: #938E99;
    --line: rgba(31, 27, 36, 0.08);
    --r-md: 18px;
    --r-lg: 26px;
    --r-xl: 36px;
    --r-pill: 999px;
    --shadow-lg: 0 22px 60px rgba(31, 27, 36, 0.10);
    --font: 'Sasson Montessori', 'Playpen Sans', system-ui, sans-serif;
    --font-head: 'Playpen Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(1000px 560px at 100% -6%, var(--sun-soft) 0%, transparent 52%),
      radial-gradient(900px 520px at -5% 4%, var(--cerise-soft) 0%, transparent 50%),
      radial-gradient(800px 520px at 50% 112%, var(--lime-soft) 0%, transparent 55%),
      var(--bg);
    min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 24px 64px; }

  .brandbar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 26px; }
  .brandbar img { height: 34px; width: auto; }
  .brandbar .brandname { font-weight: 700; font-size: 15px; }

  .topchip {
    display: block; width: fit-content; margin: 0 auto 18px;
    background: var(--cerise); color: #fff;
    font-size: 12.5px; font-weight: 700; letter-spacing: 0.03em;
    padding: 8px 18px; border-radius: var(--r-pill);
    box-shadow: 0 8px 20px rgba(233, 30, 137, 0.28);
  }

  .free-deliver {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    max-width: 760px; margin: 0 auto 24px; padding: 14px 18px;
    background: var(--lime-soft); border: 1px solid var(--lime);
    border-radius: var(--r-lg); box-shadow: 0 6px 22px rgba(164, 210, 51, 0.18);
  }
  .free-deliver .fd-check { font-size: 22px; line-height: 1; }
  .free-deliver .fd-text { flex: 1; min-width: 180px; font-weight: 700; font-size: 14.5px; color: #4c6b12; }
  .free-deliver .fd-btn {
    font-family: inherit; font-weight: 800; font-size: 14px;
    padding: 11px 18px; border-radius: var(--r-pill);
    background: var(--ink); color: #fff; cursor: pointer; border: none;
    transition: transform .16s ease, background .16s ease;
  }
  .free-deliver .fd-btn:hover { transform: translateY(-1px); background: var(--cerise); }

  .head { text-align: center; margin-bottom: 28px; }
  h1 {
    font-size: clamp(28px, 4.4vw, 42px);
    font-weight: 800; line-height: 1.14; letter-spacing: -0.02em;
    max-width: 760px; margin: 0 auto 16px;
  }
  h1 .hl { background: linear-gradient(120deg, var(--cerise), var(--sun)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .head p { font-size: 17px; color: var(--ink-soft); max-width: 620px; margin: 0 auto; }

  /* Nedtelling */
  .countdown {
    margin: 0 auto 34px; max-width: 520px;
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: var(--r-lg); box-shadow: 0 8px 28px rgba(31,27,36,0.06);
    padding: 20px 22px; text-align: center;
  }
  .countdown .cd-label {
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--cerise); margin-bottom: 12px;
  }
  .cd-clock { display: flex; justify-content: center; gap: 12px; }
  .cd-unit { min-width: 70px; }
  .cd-num {
    font-size: 34px; font-weight: 800; line-height: 1;
    background: linear-gradient(150deg, var(--ink), #4a4350);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-variant-numeric: tabular-nums;
  }
  .cd-tag { font-size: 11px; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; }
  .cd-sep { font-size: 30px; font-weight: 800; color: var(--line); align-self: flex-start; }
  .countdown.expired .cd-clock { opacity: 0.45; }
  .cd-expired-note { display: none; margin-top: 12px; font-size: 13.5px; color: var(--ink-soft); }
  .countdown.expired .cd-expired-note { display: block; }

  /* Tilbudskort */
  .offer {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: var(--r-xl); box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: grid; grid-template-columns: 0.85fr 1.15fr;
  }
  .offer-media { background: var(--lime-soft); position: relative; }
  .offer-media img,
  .offer-media video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .offer-body { padding: 34px; }

  .price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 22px; }
  .price-now { font-size: 48px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .price-cur { font-size: 22px; font-weight: 700; color: var(--ink-soft); }
  .price-before { font-size: 18px; color: var(--ink-muted); text-decoration: line-through; }

  .bullets { list-style: none; display: grid; gap: 12px; margin-bottom: 22px; }
  .bullets li { display: flex; align-items: flex-start; gap: 11px; font-size: 15px; }
  .bullets .tick {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
    background: var(--lime-soft); color: #5b7d12;
    display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; margin-top: 1px;
  }

  .guarantee {
    display: flex; align-items: center; gap: 10px;
    background: var(--sun-soft); border-radius: var(--r-md);
    padding: 12px 16px; font-size: 13.5px; color: #7a5e00; margin-bottom: 22px;
  }
  .guarantee svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--sun); }

  .btn-buy {
    width: 100%; font-size: 17px; font-weight: 800;
    padding: 17px 22px; border-radius: var(--r-pill);
    background: linear-gradient(120deg, var(--cerise), #ff5fb0);
    color: #fff; box-shadow: 0 12px 28px rgba(233, 30, 137, 0.32);
    transition: transform .16s ease, box-shadow .16s ease;
  }
  .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 18px 36px rgba(233, 30, 137, 0.4); }
  .btn-decline {
    display: block; width: 100%; text-align: center; margin-top: 14px;
    font-size: 13.5px; font-weight: 600; color: var(--ink-muted);
    padding: 8px; transition: color .16s ease;
  }
  .btn-decline:hover { color: var(--ink-soft); text-decoration: underline; }

  .social { text-align: center; margin-top: 26px; font-size: 14px; color: var(--ink-soft); }
  .social .stars { color: var(--sun); letter-spacing: 2px; }

  .footer { text-align: center; margin-top: 50px; font-size: 13px; color: var(--ink-muted); }

  @media (max-width: 800px) {
    .offer { grid-template-columns: 1fr; }
    .offer-media { aspect-ratio: 16 / 9; }
  }
  @media (max-width: 520px) {
    .wrap { padding: 22px 16px 48px; }
    .offer-body { padding: 24px; }
    .cd-unit { min-width: 58px; }
    .cd-num { font-size: 28px; }
  }

  /* Laast fontregel: Sasson Montessori paa alt unntatt overskrifter */
  h1, h2, h3, h4, h5, h6 { font-family: var(--font-head); }
  button, input, select, textarea { font-family: var(--font); }
</style>
</head>
<body>
  <div class="wrap">
    <a class="brandbar" href="/dashboard" title="Til dashbordet" style="color:inherit;text-decoration:none">
      <img id="brandLogo" src="/images/lme-logo.png" alt="LME" onerror="this.style.display='none'">
      <span class="brandname" id="brandName">LME</span>
    </a>

    <!-- Levering av gratisguiden rett etter påmelding -->
    <div class="free-deliver" id="freeDeliver" style="display:none;">
      <span class="fd-check">🎁</span>
      <span class="fd-text" id="freeDeliverText"></span>
      <button class="fd-btn" id="freeDeliverBtn"></button>
    </div>

    <span class="topchip" id="topLabel"></span>

    <div class="head">
      <h1 id="offerHeading"></h1>
      <p id="offerSub"></p>
    </div>

    <!-- Nedtelling -->
    <div class="countdown" id="countdown">
      <div class="cd-label" id="cdLabel"></div>
      <div class="cd-clock">
        <div class="cd-unit"><div class="cd-num" id="cdH">00</div><div class="cd-tag">timer</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="cdM">00</div><div class="cd-tag">min</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="cdS">00</div><div class="cd-tag">sek</div></div>
      </div>
      <div class="cd-expired-note">Tilbudet har utløpt — men du kan fortsatt sikre deg guiden nedenfor.</div>
    </div>

    <!-- Tilbudskort -->
    <div class="offer">
      <div class="offer-media">
        <video id="offerVideo" autoplay muted loop playsinline controls preload="metadata">
          <source id="offerVideoSrc" src="" type="video/mp4">
        </video>
      </div>
      <div class="offer-body">
        <div class="price-row">
          <span class="price-now" id="priceNow"></span>
          <span class="price-cur" id="priceCur"></span>
          <span class="price-before" id="priceBefore"></span>
        </div>
        <ul class="bullets" id="offerBullets"></ul>
        <div class="guarantee">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
          <span id="offerGuarantee"></span>
        </div>
        <button class="btn-buy" id="buyBtn"></button>
        <a href="#" class="btn-decline" id="declineBtn"></a>
      </div>
    </div>

    <div class="social">
      <span id="offerSocial"></span>
    </div>

    <div class="footer">© <span id="yr"></span> <span id="brandFooter">LME</span></div>
  </div>

  <script src="funnel-config.js"></script>
  <script>
    // Språk: ?lang=… > localStorage 'lme_lang' (samme som plattformen) > 'no'
    const LANG = (() => {
      const q = new URLSearchParams(location.search).get('lang');
      let l = (q || localStorage.getItem('lme_lang') || 'no').toLowerCase();
      if (l !== 'en' && l !== 'no') l = 'no';
      try { localStorage.setItem('lme_lang', l); } catch (e) {}
      return l;
    })();
    document.documentElement.lang = LANG;
    const C = window.LME_FUNNEL[LANG] || window.LME_FUNNEL.no;

    // Språk-knapp (🇬🇧/🇳🇴) — samme valg som resten av plattformen
    (() => {
      const b = document.createElement('button');
      b.textContent = LANG === 'en' ? '🇳🇴 Norsk' : '🇬🇧 English';
      b.setAttribute('aria-label', 'Bytt språk / Switch language');
      b.style.cssText = 'position:fixed;top:16px;right:16px;z-index:300;display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(31,27,36,.12);background:#fff;color:#1F1B24;font-family:inherit;font-weight:700;font-size:13px;line-height:1;padding:10px 15px;border-radius:999px;box-shadow:0 6px 20px rgba(31,27,36,.12);cursor:pointer;';
      b.addEventListener('click', () => {
        const next = LANG === 'en' ? 'no' : 'en';
        try { localStorage.setItem('lme_lang', next); } catch (e) {}
        const u = new URL(location.href); u.searchParams.set('lang', next); location.href = u.toString();
      });
      document.body.appendChild(b);
    })();
    const t = C.tilbud;
    const p = C.tilbudPris;
    const txt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };

    // Branding
    document.getElementById('brandLogo').src = C.brand.logo;
    txt('brandName', C.brand.kortnavn);
    txt('brandFooter', C.brand.navn);
    txt('yr', new Date().getFullYear());

    // Innhold
    txt('topLabel', t.merkelapp);
    document.getElementById('offerHeading').innerHTML = highlightLast(t.overskrift);
    txt('offerSub', t.underoverskrift);
    txt('cdLabel', t.nedtellingTekst);
    if (t.garanti) { txt('offerGuarantee', t.garanti); }
    else { const gEl = document.getElementById('offerGuarantee'); const gBox = gEl && gEl.closest('.guarantee'); if (gBox) gBox.style.display = 'none'; }
    txt('buyBtn', t.kjopKnapp);
    txt('declineBtn', t.avslaaKnapp);
    txt('offerSocial', t.sosialtBevis);

    // Levering av gratisguiden (vises bare hvis en lenke er satt i config)
    if (t.gratisLenke) {
      txt('freeDeliverText', t.gratisLevering || '');
      const fb = document.getElementById('freeDeliverBtn');
      fb.textContent = t.gratisKnapp || 'Last ned';
      fb.addEventListener('click', () => window.open(t.gratisLenke, '_blank', 'noopener'));
      document.getElementById('freeDeliver').style.display = 'flex';
    }

    // Video: starter automatisk uten lyd, men har synlige kontroller
    // så brukeren kan trykke play/pause og skru på lyd.
    const video = document.getElementById('offerVideo');
    const vsrc = document.getElementById('offerVideoSrc');
    if (t.bilde) video.setAttribute('poster', t.bilde);   // stillbilde som vises før/uten avspilling
    if (t.video) {
      vsrc.src = t.video;
      video.load();
      const pr = video.play();                            // forsøk autoplay (tillatt fordi muted)
      if (pr && pr.catch) pr.catch(() => {});              // ignorer hvis nettleseren blokkerer autoplay
    } else {
      video.removeAttribute('controls');                  // ingen video satt → vis kun poster
    }

    // Pris
    txt('priceNow', p.belop);
    txt('priceCur', p.valuta);
    const pb = document.getElementById('priceBefore');
    if (p.visningFor) pb.textContent = p.visningFor; else pb.style.display = 'none';

    // Punkter
    const ul = document.getElementById('offerBullets');
    t.punkter.forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="tick">✓</span><span>' + item + '</span>';
      ul.appendChild(li);
    });

    function highlightLast(str) {
      const words = str.split(' ');
      if (words.length < 3) return str;
      const cut = words.length - 3;
      return words.slice(0, cut).join(' ') + ' <span class="hl">' + words.slice(cut).join(' ') + '</span>';
    }

    /* ---- Nedtelling: starter ved første besøk, lagres i nettleseren ---- */
    const KEY = 'lme_tripwire_deadline';
    const totalMs = (p.timerNedtelling || 72) * 60 * 60 * 1000;
    let deadline = parseInt(localStorage.getItem(KEY) || '0', 10);
    if (!deadline || isNaN(deadline) || deadline < Date.now()) {
      // (Re)start nedtellingen hvis den ikke finnes eller er utløpt for lenge siden
      if (!deadline) { deadline = Date.now() + totalMs; localStorage.setItem(KEY, String(deadline)); }
    }

    const cd = document.getElementById('countdown');
    const pad = n => String(n).padStart(2, '0');
    function tick() {
      let left = deadline - Date.now();
      if (left <= 0) {
        left = 0;
        cd.classList.add('expired');
        txt('cdH', '00'); txt('cdM', '00'); txt('cdS', '00');
        clearInterval(timer);
        return;
      }
      const h = Math.floor(left / 3600000);
      const m = Math.floor((left % 3600000) / 60000);
      const s = Math.floor((left % 60000) / 1000);
      txt('cdH', pad(h)); txt('cdM', pad(m)); txt('cdS', pad(s));
    }
    tick();
    const timer = setInterval(tick, 1000);

    /* ---- Knapper ---- */
    document.getElementById('buyBtn').addEventListener('click', () => {
      if (C.brand.checkoutUrl) { window.location.href = C.brand.checkoutUrl; }
      else { window.location.href = C.brand.etterKjop; }
    });
    document.getElementById('declineBtn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = C.brand.avslo;
    });
  </script>
<script src="/js/lme-visibility.js?v=4" defer></script>
</body>
</html>
