<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF7F0">
<title>Takk — guiden er på vei · LME</title>
<link rel="icon" href="/images/lme-logo.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --lime: #A4D233; --lime-soft: #E8F5D1;
    --cerise: #E91E89; --cerise-soft: #FCE3F1;
    --sun: #F7C72E; --sun-soft: #FFF4D6;
    --bg: #FBF7F0; --bg-2: #FFFFFF;
    --ink: #1F1B24; --ink-soft: #5A5560; --ink-muted: #938E99;
    --line: rgba(31, 27, 36, 0.08);
    --r-md: 18px; --r-lg: 26px; --r-xl: 36px; --r-pill: 999px;
    --shadow-lg: 0 22px 60px rgba(31, 27, 36, 0.10);
    --font: 'Playpen Sans', 'Comic Sans MS', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font); color: var(--ink);
    background:
      radial-gradient(900px 520px at 50% -10%, var(--sun-soft) 0%, transparent 55%),
      radial-gradient(700px 460px at 0% 100%, var(--lime-soft) 0%, transparent 55%),
      radial-gradient(700px 460px at 100% 90%, var(--cerise-soft) 0%, transparent 55%),
      var(--bg);
    min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  .wrap { max-width: 620px; width: 100%; padding: 40px 24px; text-align: center; }

  .brandbar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; }
  .brandbar img { height: 34px; }
  .brandbar .brandname { font-weight: 700; font-size: 15px; }

  .seal {
    width: 88px; height: 88px; margin: 0 auto 22px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sun), #e0a800);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 36px rgba(224, 168, 0, 0.30);
    animation: pop .5s cubic-bezier(.18,.89,.32,1.28) both;
  }
  .seal svg { width: 42px; height: 42px; color: #fff; }
  @keyframes pop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .chip {
    display: inline-block; background: var(--sun-soft); color: #7a5e00;
    font-size: 12.5px; font-weight: 700; letter-spacing: 0.03em;
    padding: 6px 15px; border-radius: var(--r-pill); margin-bottom: 18px;
  }
  h1 { font-size: clamp(26px, 4.8vw, 36px); font-weight: 800; line-height: 1.16; letter-spacing: -0.02em; margin-bottom: 14px; }
  .lead { font-size: 16.5px; color: var(--ink-soft); max-width: 480px; margin: 0 auto 30px; }

  .card {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: var(--r-xl); box-shadow: var(--shadow-lg);
    padding: 30px; text-align: left; margin-bottom: 26px;
  }
  .card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; text-align: center; color: var(--ink-soft); }
  .steps { list-style: none; display: grid; gap: 14px; }
  .steps li { display: flex; align-items: flex-start; gap: 13px; font-size: 15px; }
  .steps .n {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--lime), #7fae1f); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
  }

  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; font-size: 16.5px; font-weight: 800;
    padding: 16px 22px; border-radius: var(--r-pill);
    background: var(--ink); color: #fff;
    box-shadow: 0 12px 28px rgba(31, 27, 36, 0.18);
    transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
  }
  .btn-primary:hover { transform: translateY(-2px); background: var(--cerise); box-shadow: 0 18px 36px rgba(233, 30, 137, 0.30); }
  .btn-secondary { display: inline-block; margin-top: 14px; font-size: 14px; font-weight: 600; color: var(--ink-muted); }
  .btn-secondary:hover { color: var(--ink-soft); text-decoration: underline; }

  /* Soft second-chance på tilbudet */
  .reoffer {
    margin-top: 30px; padding: 20px 22px;
    background: var(--cerise-soft); border-radius: var(--r-lg);
    font-size: 14.5px; color: #9c0d5c;
  }
  .reoffer a {
    display: inline-block; margin-top: 12px;
    background: #fff; color: var(--cerise);
    font-weight: 700; font-size: 13.5px;
    padding: 9px 18px; border-radius: var(--r-pill);
    box-shadow: 0 4px 14px rgba(233, 30, 137, 0.16);
    transition: transform .16s ease;
  }
  .reoffer a:hover { transform: translateY(-1px); }

  .footer { margin-top: 26px; font-size: 13px; color: var(--ink-muted); }
  @media (max-width: 520px) { .card { padding: 22px; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brandbar">
      <img id="brandLogo" src="/images/lme-logo.png" alt="LME" onerror="this.style.display='none'">
      <span class="brandname" id="brandName">LME</span>
    </div>

    <div class="seal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16v12H4z"/><path d="M4 7l8 6 8-6"/></svg>
    </div>

    <span class="chip" id="label"></span>
    <h1 id="heading"></h1>
    <p class="lead" id="sub"></p>

    <div class="card">
      <h3>Slik kommer du i gang</h3>
      <ul class="steps" id="steps"></ul>
    </div>

    <button class="btn-primary" id="mainBtn"></button>
    <a href="#" class="btn-secondary" id="secBtn"></a>

    <div class="reoffer">
      <span id="reText"></span><br>
      <a href="#" id="reBtn"></a>
    </div>

    <div class="footer">© <span id="yr"></span> <span id="brandFooter">LME</span></div>
  </div>

  <script src="funnel-config.js"></script>
  <script>
    // Språk: ?lang=… > localStorage 'lme_lang' (samme som plattformen) > 'no'
    const LANG = (() => {
      const q = new URLSearchParams(location.search).get('lang');
      let l = (q || localStorage.getItem('lme_lang') || 'no').toLowerCase();
      if (l !== 'en' && l !== 'no') l = 'no';
      try { localStorage.setItem('lme_lang', l); } catch (e) {}
      return l;
    })();
    document.documentElement.lang = LANG;
    const C = window.LME_FUNNEL[LANG] || window.LME_FUNNEL.no;

    // Språk-knapp (🇬🇧/🇳🇴) — samme valg som resten av plattformen
    (() => {
      const b = document.createElement('button');
      b.textContent = LANG === 'en' ? '🇳🇴 Norsk' : '🇬🇧 English';
      b.setAttribute('aria-label', 'Bytt språk / Switch language');
      b.style.cssText = 'position:fixed;top:16px;right:16px;z-index:300;display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(31,27,36,.12);background:#fff;color:#1F1B24;font-family:inherit;font-weight:700;font-size:13px;line-height:1;padding:10px 15px;border-radius:999px;box-shadow:0 6px 20px rgba(31,27,36,.12);cursor:pointer;';
      b.addEventListener('click', () => {
        const next = LANG === 'en' ? 'no' : 'en';
        try { localStorage.setItem('lme_lang', next); } catch (e) {}
        const u = new URL(location.href); u.searchParams.set('lang', next); location.href = u.toString();
      });
      document.body.appendChild(b);
    })();
    const k = C.takkIkkeKjoper;
    const txt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };

    document.getElementById('brandLogo').src = C.brand.logo;
    txt('brandName', C.brand.kortnavn);
    txt('brandFooter', C.brand.navn);
    txt('yr', new Date().getFullYear());

    txt('label', k.merkelapp);
    txt('heading', k.overskrift);
    txt('sub', k.underoverskrift);

    const ul = document.getElementById('steps');
    k.steg.forEach((s, i) => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="n">' + (i + 1) + '</span><span>' + s + '</span>';
      ul.appendChild(li);
    });

    // Filer (PDF/lyd/video) åpnes i ny fane; ellers vanlig navigering.
    const openLink = (url) => {
      if (/\.(pdf|zip|epub|mp3|mp4|m4a|wav)$/i.test(url)) window.open(url, '_blank', 'noopener');
      else window.location.href = url;
    };
    const main = document.getElementById('mainBtn');
    if (k.knappLenke) {
      main.textContent = k.knapp;
      main.addEventListener('click', () => openLink(k.knappLenke));
    } else {
      main.style.display = 'none';
    }

    const sec = document.getElementById('secBtn');
    sec.textContent = k.sekundaerKnapp;
    sec.href = k.sekundaerLenke;

    txt('reText', k.angre);
    const re = document.getElementById('reBtn');
    re.textContent = k.angreKnapp;
    re.href = k.angreLenke;
  </script>
</body>
</html>
