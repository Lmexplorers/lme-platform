<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F8D7DA">
<title>Produkter — LME Creative Academy</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700;800&display=swap');
  @font-face {
    font-family: 'Sasson Montessori';
    src: url('/fonts/SassoonMontessori.woff2') format('woff2'),
         url('/fonts/SassoonMontessori.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  /* =========================================
     LME Creative Academy
     Hovedside (som FEA Create)
     ========================================= */

  :root {
    --pink-soft: #F8D7DA;
    --pink-mid: #F5A8B8;
    --pink-deep: #EE9CAD;
    --cream: #FBF6F0;
    --cream-deep: #F4E9DD;
    --cerise: #E91E89;
    --sun: #F7C72E;
    --sky: #3FA9F5;
    --lime: #A4D233;
    --ink: #1A1A1A;
    --ink-soft: #4A4A4A;
    --ink-muted: #8A8A8A;
    --line: rgba(26, 26, 26, 0.08);
    --line-soft: rgba(26, 26, 26, 0.04);

    --btn-yellow: #F7E76B;
    --btn-yellow-hover: #F0DD4F;
    --btn-dark: #1A1A1A;

    --shadow-sm: 0 1px 3px rgba(26, 26, 26, 0.04), 0 1px 2px rgba(26, 26, 26, 0.03);
    --shadow-md: 0 4px 16px rgba(26, 26, 26, 0.06), 0 2px 6px rgba(26, 26, 26, 0.04);
    --shadow-lg: 0 12px 40px rgba(26, 26, 26, 0.08), 0 4px 12px rgba(26, 26, 26, 0.04);

    --r-sm: 12px;
    --r-md: 18px;
    --r-lg: 24px;
    --r-xl: 32px;
    --r-pill: 999px;

    --font-body: 'Sasson Montessori', 'Playpen Sans', system-ui, sans-serif;
    --font-heading: 'Playpen Sans', system-ui, sans-serif;

    --sidebar-w: 260px;
  }

  /* Playpen Sans fra Google Fonts — har naturlig rund "a" */
  /* Overskrifter bruker Playpen Sans eksplisitt */
  h1, h2, h3, h4, h5, h6,
  .topbar-logo,
  .topbar-logo .badge,
  .page-header h1,
  .page-header h1 em,
  .section-header h2,
  .tool-card h3,
  .welcome-card-text h3,
  .sidebar-group-title,
  .quick-btn,
  .btn-studio {
    font-family: var(--font-heading);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background: linear-gradient(180deg, #FDF5F1 0%, #FBEAE9 50%, #F8D7DA 100%);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  /* =========================================
     TOPP-BAR (slank)
     ========================================= */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(253, 245, 241, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    gap: 20px;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-burger {
    display: none;
    width: 38px;
    height: 38px;
    border-radius: var(--r-sm);
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: background 0.18s ease;
  }
  .topbar-burger:hover { background: rgba(248, 215, 218, 0.5); }
  .topbar-burger svg { width: 22px; height: 22px; }

  .topbar-logo {
    font-weight: 700;
    font-size: 17px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
  }
  .topbar-logo-img { height: 32px; width: auto; display: block; }
  .topbar-logo .badge {
    background: linear-gradient(135deg, var(--pink-mid), var(--cerise));
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: var(--r-pill);
    letter-spacing: 0.04em;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    transition: all 0.18s ease;
  }
  .topbar-back:hover {
    background: rgba(248, 215, 218, 0.5);
    color: var(--ink);
  }
  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    transition: all 0.18s ease;
  }
  .icon-btn:hover { background: rgba(248, 215, 218, 0.5); color: var(--ink); }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn .dot {
    position: absolute;
    top: 9px;
    right: 9px;
    width: 7px;
    height: 7px;
    background: var(--cerise);
    border-radius: 50%;
    border: 2px solid #FDF5F1;
  }
  .icon-btn { position: relative; }

  .avatar-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-mid), var(--cerise));
    color: white;
    font-weight: 700;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
  }

  /* =========================================
     LAYOUT
     ========================================= */
  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    gap: 0;
    min-height: calc(100vh - 65px);
  }

  /* =========================================
     SIDEBAR
     ========================================= */
  .sidebar {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-right: 1px solid var(--line);
    padding: 24px 16px;
    overflow-y: auto;
    position: sticky;
    top: 65px;
    height: calc(100vh - 65px);
    scrollbar-width: thin;
    scrollbar-color: var(--pink-mid) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--pink-mid); border-radius: 3px; }

  .sidebar-group {
    margin-bottom: 22px;
  }
  .sidebar-group:last-child { margin-bottom: 0; }

  .sidebar-group-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    padding: 0 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sidebar-group-title .grp-emoji {
    font-size: 14px;
    filter: grayscale(0.2);
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 12px;
    border-radius: var(--r-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: all 0.18s ease;
    margin-bottom: 2px;
    cursor: pointer;
    position: relative;
  }
  .sidebar-item:hover {
    background: rgba(248, 215, 218, 0.5);
    color: var(--ink);
  }
  .sidebar-item.active {
    background: linear-gradient(135deg, var(--pink-soft), var(--pink-mid));
    color: var(--ink);
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(233, 30, 137, 0.12);
  }
  .sidebar-item .si-icon {
    width: 20px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .sidebar-item .si-label {
    flex: 1;
  }
  .sidebar-item .si-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border-radius: var(--r-pill);
    background: rgba(26, 26, 26, 0.08);
    color: var(--ink-muted);
  }
  .sidebar-item .si-badge.beta {
    background: var(--sky);
    color: #fff;
  }
  .sidebar-item.disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .sidebar-item.disabled:hover {
    background: transparent;
    color: var(--ink-soft);
  }

  .sidebar-divider {
    height: 1px;
    background: var(--line);
    margin: 14px 8px;
  }

  /* Sidebar footer (Renate AI float) */
  .sidebar-ai-card {
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(248, 215, 218, 0.5));
    border-radius: var(--r-md);
    border: 1px solid var(--line);
    text-align: center;
  }
  .sidebar-ai-card .ai-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-mid), var(--cerise));
    color: white;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    box-shadow: 0 4px 12px rgba(233, 30, 137, 0.25);
  }
  .sidebar-ai-card p {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .sidebar-ai-card a {
    display: inline-block;
    background: var(--ink);
    color: white;
    padding: 7px 14px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 600;
    transition: transform 0.18s ease;
  }
  .sidebar-ai-card a:hover { transform: translateY(-1px); }

  /* =========================================
     HOVEDINNHOLD
     ========================================= */
  .main {
    padding: 32px 40px 60px;
    max-width: 1200px;
    width: 100%;
  }

  .page-header {
    margin-bottom: 36px;
  }
  .page-header h1 {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .page-header h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--cerise), var(--pink-mid));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .page-header p {
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 640px;
  }

  /* Hurtigvalg-rad */
  .quick-row {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .quick-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 18px;
    border-radius: var(--r-pill);
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    transition: all 0.18s ease;
    box-shadow: var(--shadow-sm);
  }
  .quick-btn:hover {
    background: white;
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .quick-btn.primary {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .quick-btn.primary:hover {
    background: var(--cerise);
    border-color: var(--cerise);
  }
  .quick-btn.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Seksjon */
  .section {
    margin-bottom: 48px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px;
  }
  .section-header h2 {
    font-size: 22px;
    font-weight: 700;
  }
  .section-header a {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 600;
    transition: color 0.18s;
  }
  .section-header a:hover { color: var(--cerise); }

  /* Kom i gang / Get set up-sjekkliste */
  .setup-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 48px;
  }
  .setup-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .setup-top h2 { font-size: 22px; font-weight: 700; }
  .setup-top p { font-size: 13px; color: var(--ink-soft); margin-top: 4px; max-width: 460px; }
  .setup-progress { min-width: 180px; flex: 0 0 auto; }
  .setup-progress-label {
    font-size: 13px; font-weight: 700; color: var(--ink);
    display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px;
  }
  .setup-progress-label span:last-child { color: var(--cerise); }
  .setup-bar {
    height: 8px; border-radius: var(--r-pill);
    background: var(--cream-deep); overflow: hidden;
  }
  .setup-bar-fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--pink-mid), var(--cerise));
    border-radius: var(--r-pill);
    transition: width 0.4s ease;
  }
  .setup-steps { display: flex; flex-direction: column; gap: 4px; }
  .setup-step {
    display: flex; align-items: center; gap: 14px;
    padding: 12px; border-radius: var(--r-md);
    transition: background 0.18s;
  }
  .setup-step:hover { background: var(--cream); }
  .setup-check {
    flex: 0 0 auto; width: 26px; height: 26px;
    border-radius: 50%; border: 2px solid var(--pink-deep);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; line-height: 1;
    transition: all 0.18s;
  }
  .setup-check:hover { border-color: var(--cerise); }
  .setup-step.done .setup-check {
    background: var(--cerise); border-color: var(--cerise);
  }
  .setup-step:not(.done) .setup-check { color: transparent; }
  .setup-step-text { flex: 1 1 auto; min-width: 0; }
  .setup-step-text h3 { font-size: 15px; font-weight: 600; }
  .setup-step-text p { font-size: 13px; color: var(--ink-muted); margin-top: 2px; }
  .setup-step.done .setup-step-text h3 { text-decoration: line-through; color: var(--ink-muted); }
  .setup-step-go {
    flex: 0 0 auto; font-size: 13px; font-weight: 600;
    color: var(--ink-muted); display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap; transition: color 0.18s;
  }
  .setup-step-go:hover { color: var(--cerise); }
  .setup-done-msg {
    display: none; margin-top: 12px; padding: 12px 16px;
    background: var(--pink-soft); border-radius: var(--r-md);
    font-size: 14px; font-weight: 600; color: var(--ink);
  }
  .setup-card.all-done .setup-done-msg { display: block; }

  /* Verktøy-grid */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .tool-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 20px;
    transition: all 0.22s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .tool-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    background: white;
  }
  .tool-card .tool-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--r-md);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .tool-card.ic-1 .tool-icon { background: linear-gradient(135deg, #FFE1E8, #F5A8B8); }
  .tool-card.ic-2 .tool-icon { background: linear-gradient(135deg, #FFF4D6, #F7C72E); }
  .tool-card.ic-3 .tool-icon { background: linear-gradient(135deg, #D8EEFF, #3FA9F5); }
  .tool-card.ic-4 .tool-icon { background: linear-gradient(135deg, #E8F5D1, #A4D233); }
  .tool-card.ic-5 .tool-icon { background: linear-gradient(135deg, #FFE9F5, #F49DC5); }
  .tool-card.ic-6 .tool-icon { background: linear-gradient(135deg, #EFE5FF, #B294E8); }

  .tool-card h3 {
    font-size: 15px;
    font-weight: 700;
  }
  .tool-card p {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.45;
  }
  .tool-card .tool-tag {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: var(--r-pill);
    background: var(--cerise);
    color: white;
  }
  .tool-card .tool-tag.soon {
    background: rgba(26, 26, 26, 0.08);
    color: var(--ink-muted);
  }
  .tool-card .tool-tag.beta {
    background: var(--sky);
  }
  .tool-card.disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }
  .tool-card.disabled:hover {
    transform: none;
    box-shadow: none;
    background: rgba(255, 255, 255, 0.7);
  }

  /* Velkomst-kort */
  .welcome-card {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.85), rgba(248, 215, 218, 0.5));
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    padding: 28px;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .welcome-card-text h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .welcome-card-text p {
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 480px;
  }
  .welcome-card-action {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: white;
    padding: 11px 20px;
    border-radius: var(--r-pill);
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .welcome-card-action:hover {
    background: var(--cerise);
    transform: translateY(-1px);
  }

  /* =========================================
     MOBIL
     ========================================= */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 26, 0.4);
    backdrop-filter: blur(4px);
    z-index: 80;
  }
  .sidebar-overlay.active { display: block; }

  @media (max-width: 1024px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 280px;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 90;
      padding-top: 80px;
      box-shadow: var(--shadow-lg);
      background: rgba(253, 245, 241, 0.98);
    }
    .sidebar.open { transform: translateX(0); }
    .topbar-burger { display: inline-flex; }
    .main { padding: 24px 20px 40px; }
    .page-header h1 { font-size: 28px; }
  }

  @media (max-width: 600px) {
    .topbar-inner { padding: 10px 14px; }
    .topbar-back span { display: none; }
    .topbar-back { padding: 8px; }
    .welcome-card { flex-direction: column; align-items: flex-start; }
    .main { padding: 20px 16px 32px; }
    .page-header h1 { font-size: 24px; }
    .quick-row { gap: 8px; }
    .quick-btn { padding: 9px 14px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- ===================================
     TOPP-BAR
     =================================== -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <button class="topbar-burger" id="burger" aria-label="Meny">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
      </button>
      <a href="/dashboard" class="topbar-logo">
        <img src="/images/lme-logo.png" alt="LME" class="topbar-logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';">
        <span class="topbar-logo-text" style="display:none;">LME</span>
        <span class="badge">CREATIVE ACADEMY</span>
      </a>
    </div>

    <div class="topbar-right">
      <a href="/dashboard" class="topbar-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Til dashbord</span>
      </a>
      <button class="icon-btn" aria-label="Søk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
      <button class="icon-btn" aria-label="Varsler">

<script>
  // Sidebar toggle (mobil)
  const burger = document.getElementById('burger');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  }

  burger.addEventListener('click', openSidebar);
  overlay.addEventListener('click', closeSidebar);

  // Lukk sidebar når man klikker en aktiv lenke på mobil
  document.querySelectorAll('.sidebar-item:not(.disabled)').forEach(item => {
    item.addEventListener('click', () => {
      if (window.innerWidth <= 1024) closeSidebar();
    });
  });

  // Active state-håndtering
  document.querySelectorAll('.sidebar-item:not(.disabled)').forEach(item => {
    item.addEventListener('click', function(e) {
      // Bare for ankerlenker (interne) — la ekstern lenke gå som vanlig
      if (this.getAttribute('href')?.startsWith('#')) {
        document.querySelectorAll('.sidebar-item.active').forEach(a => a.classList.remove('active'));
        this.classList.add('active');
      }
    });
  });

  // Kom i gang-sjekkliste: fremdrift + lagring i nettleseren
  (function () {
    const card = document.querySelector('[data-setup]');
    if (!card) return;
    const KEY = 'lme_setup_steps';
    const steps = Array.from(card.querySelectorAll('.setup-step'));
    const fill = card.querySelector('[data-setup-fill]');
    const count = card.querySelector('[data-setup-count]');
    const pct = card.querySelector('[data-setup-pct]');
    let done;
    try { done = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { done = {}; }

    function render() {
      let n = 0;
      steps.forEach(step => {
        const isDone = !!done[step.dataset.step];
        step.classList.toggle('done', isDone);
        if (isDone) n++;
      });
      const total = steps.length;
      const p = Math.round((n / total) * 100);
      fill.style.width = p + '%';
      count.textContent = n + ' av ' + total + ' fullført';
      pct.textContent = p + '%';
      card.classList.toggle('all-done', n === total);
    }

    steps.forEach(step => {
      step.querySelector('.setup-check').addEventListener('click', () => {
        done[step.dataset.step] = !done[step.dataset.step];
        try { localStorage.setItem(KEY, JSON.stringify(done)); } catch (e) {}
        render();
      });
    });

    render();
  })();
</script>
