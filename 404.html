<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F8D7DA">
<title>Siden finnes ikke — LME</title>

<style>
  @font-face {
    font-family: 'Sasson Montessori';
    src: url('/fonts/SassoonMontessori.woff2') format('woff2'),
         url('/fonts/SassoonMontessori.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Playpen Sans';
    src: local('Playpen Sans');
    font-display: swap;
  }

  :root {
    --pink-soft: #F8D7DA;
    --pink-mid: #F5A8B8;
    --cream: #FBF6F0;
    --cerise: #E91E89;
    --sun: #F7C72E;
    --ink: #1A1A1A;
    --ink-soft: #4A4A4A;
    --ink-muted: #8A8A8A;
    --line: rgba(26, 26, 26, 0.08);
    --btn-yellow: #F7E76B;
    --btn-yellow-hover: #F0DD4F;
    --shadow-lg: 0 12px 40px rgba(26, 26, 26, 0.08);
    --r-md: 18px;
    --r-pill: 999px;
    --font-display: 'Playpen Sans', system-ui, -apple-system, sans-serif;
    --font-body: 'Sasson Montessori', 'Playpen Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    color: var(--ink);
    background:
      radial-gradient(ellipse 70% 50% at 20% 10%, rgba(255, 209, 225, 0.45), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 90%, rgba(247, 199, 46, 0.18), transparent 60%),
      linear-gradient(180deg, #FDF5F1 0%, #FBEAE9 55%, #F8D7DA 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 28px;
    box-shadow: var(--shadow-lg);
    max-width: 540px;
    width: 100%;
    padding: 56px 40px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, rgba(247, 199, 46, 0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .flower {
    font-size: 56px;
    display: block;
    margin-bottom: 8px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-8px) rotate(4deg); }
  }

  .code {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--cerise);
    background: var(--pink-soft);
    padding: 6px 16px;
    border-radius: var(--r-pill);
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(26px, 5vw, 34px);
    font-weight: 500;
    line-height: 1.15;
    margin-bottom: 14px;
  }

  h1 em {
    font-style: italic;
    color: var(--cerise);
  }

  p {
    color: var(--ink-soft);
    font-size: 16px;
    max-width: 400px;
    margin: 0 auto 32px;
  }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: var(--r-pill);
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.2s ease;
    font-family: inherit;
  }

  .btn-primary {
    background: var(--btn-yellow);
    color: var(--ink);
  }
  .btn-primary:hover { background: var(--btn-yellow-hover); transform: translateY(-2px); }

  .btn-secondary {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { background: var(--pink-soft); transform: translateY(-2px); }

  .links {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .links a {
    color: var(--ink-muted);
    font-size: 14px;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .links a:hover { color: var(--cerise); }

  @media (max-width: 480px) {
    .card { padding: 44px 24px 36px; }
    .actions { flex-direction: column; }
    .btn { width: 100%; }
  }

  /* Laast fontregel: Sasson Montessori paa alt unntatt overskrifter */
  h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }
  button, input, select, textarea { font-family: var(--font-body); }
</style>
</head>
<body>
  <main class="card">
    <span class="flower">🌸</span>
    <span class="code">SIDEN FINNES IKKE</span>
    <h1>Her var det <em>tomt</em></h1>
    <p>Denne siden finnes ikke, kanskje den er flyttet, eller så har en lenke gått seg vill. La oss finne veien tilbake sammen.</p>

    <div class="actions">
      <a href="/dashboard" class="btn btn-primary">Til dashbordet →</a>
      <a href="/academy" class="btn btn-secondary">Utforsk Akademiet</a>
    </div>

    <nav class="links">
      <a href="/biblioteket">Biblioteket</a>
      <a href="/butikk">Butikk</a>
      <a href="/community">Inner Circle</a>
      <a href="/help">Hjelp</a>
    </nav>
  </main>
<script src="/js/lme-visibility.js?v=3" defer></script>
<script src="/js/lme-account.js?v=7" defer></script>
<script src="/js/renate-widget.js?v=3" defer></script>
</body>
</html>
