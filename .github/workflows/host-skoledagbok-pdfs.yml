name: Host skoledagbok-PDF-er

# Henter de fire ferdige skoledagbok-PDF-ene fra Google Drive og publiserer dem
# som GitHub Release-filer (offentlig repo => offentlige direkte-nedlastinger,
# ingen 25 MB-grense, full kvalitet). Takkesiden lenker til release-filene.
# Kjøres manuelt: Actions -> "Host skoledagbok-PDF-er" -> Run workflow.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer gdown
        run: python3 -m pip install --quiet gdown

      - name: Last ned fra Google Drive
        run: |
          mkdir -p pdfs
          gdown "1v9QsJCtOgD5vaKBV4iOex278PSbr9z1B" -O pdfs/skoledagbok-1-3-no.pdf
          gdown "1bePd9HK3CUfmf-HMIn6aKOQzVkt52G4q" -O pdfs/skoledagbok-1-3-en.pdf
          gdown "1ohjn77TI_RgNV3EYkWDLnB_YVg2IIKvU" -O pdfs/skoledagbok-4-7-no.pdf
          gdown "13WqVhd35ush-jiHwS4HiJxHcADvEeBJJ" -O pdfs/skoledagbok-4-7-en.pdf
          ls -la pdfs

      - name: Sjekk at filene faktisk er PDF
        run: |
          for f in pdfs/*.pdf; do
            if ! head -c4 "$f" | grep -q '%PDF'; then
              echo "::error::$f er ikke en PDF. Sannsynligvis er nedlasting avslått for lesere på Drive-fila."
              exit 1
            fi
          done

      - name: Publiser som GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete skoledagbok-pdf --yes --cleanup-tag 2>/dev/null || true
          gh release create skoledagbok-pdf pdfs/*.pdf \
            --title "Mia & Teo Skoledagbok — PDF" \
            --notes "Digitale skoledagbøker (norsk + engelsk). Lenkes fra takkesiden etter kjøp."

      - name: Lag forside-thumbnails (side 1 av hver PDF)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          mkdir -p images/skoledagbok
          for key in 1-3-no 1-3-en 4-7-no 4-7-en; do
            pdftoppm -png -singlefile -f 1 -l 1 -scale-to 640 \
              "pdfs/skoledagbok-$key.pdf" "images/skoledagbok/cover-$key"
          done
          ls -la images/skoledagbok

      - name: Commit forsidebilder til repoet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/skoledagbok/*.png
          git commit -m "Forside-thumbnails for skoledagbok-takkeside" || { echo "Ingen endring"; exit 0; }
          git pull --rebase origin main || true
          git push
