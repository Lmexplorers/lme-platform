<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medlem — Little Montessori Explorers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:'Sasson Montessori';src:url('/fonts/SassoonMontessori.woff2') format('woff2'),url('/fonts/SassoonMontessori.ttf') format('truetype');font-weight:normal;font-style:normal;font-display:swap;}
  :root{--cerise:#E91E89;--ink:#2a1e2e;--ink-soft:#6b5563;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sasson Montessori','Playpen Sans',system-ui,sans-serif;color:var(--ink);background:#faf6f7;}
  h1,h2,h3{font-family:'Playpen Sans',system-ui,sans-serif;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:13px 20px;background:#fff;box-shadow:0 2px 10px rgba(180,120,140,.12);}
  .bar .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cerise);text-decoration:none;font-size:15px;}
  .bar .brand img{width:32px;height:32px;object-fit:contain;}
  .bar a.lnk{color:var(--ink);text-decoration:none;border:1px solid #eedce2;border-radius:999px;padding:8px 16px;font-size:13.5px;font-weight:700;}
  .wrap{max-width:520px;margin:40px auto;padding:0 18px;}
  .card{background:#fff;border:1px solid #f3dce6;border-radius:22px;padding:36px 28px;text-align:center;box-shadow:0 10px 30px rgba(180,120,140,.12);}
  .ava{width:88px;height:88px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,#F5A8B8,#E91E89);color:#fff;display:flex;align-items:center;justify-content:center;font-size:38px;font-family:'Playpen Sans',sans-serif;font-style:italic;}
  h1{font-size:25px;margin-bottom:6px;}
  .badge{display:inline-block;font-size:12px;font-weight:700;color:var(--cerise);background:#FCEFF2;border-radius:999px;padding:4px 12px;margin-bottom:18px;}
  .btn{display:inline-block;background:var(--cerise);color:#fff;border:0;border-radius:999px;padding:12px 24px;font-weight:700;font-family:inherit;cursor:pointer;font-size:15px;text-decoration:none;}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid #eedce2;}
  .muted{color:var(--ink-soft);font-size:14.5px;line-height:1.5;margin-top:14px;}
</style>
</head>
<body>
  <div class="bar">
    <a class="brand" href="/grupper"><img src="/images/lme-logo.png" alt="LME">Little Montessori Explorers</a>
    <a class="lnk" href="/meldinger">Meldinger</a>
  </div>
  <div class="wrap"><div class="card" id="card"><p class="muted">Laster…</p></div></div>
<script>
(function(){
  var card=document.getElementById('card');
  function q(n){var m=location.search.match(new RegExp('[?&]'+n+'=([^&]+)'));return m?decodeURIComponent(m[1]):'';}
  var uid=q('u');
  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  if(!uid){ card.innerHTML='<p class="muted">Mangler medlem.</p>'; return; }

  fetch('/api/group/profile/'+encodeURIComponent(uid),{credentials:'same-origin'})
    .then(function(r){return r.json();})
    .then(function(p){
      if(!p || p.error){
        if(p && p.error==='forbidden'){ card.innerHTML='<p class="muted">Logg inn for å se profiler.</p><p style="margin-top:14px"><a class="btn" href="/login?next='+encodeURIComponent(location.pathname+location.search)+'">Logg inn</a></p>'; }
        else card.innerHTML='<p class="muted">Fant ikke dette medlemmet.</p>';
        return;
      }
      var initial=(p.name||'?').trim().charAt(0).toUpperCase();
      var html='<div class="ava">'+esc(initial)+'</div>'+
        '<h1>'+esc(p.name)+'</h1>'+
        (p.member?'<div class="badge">Inner Circle-medlem</div>':'')+
        '<div>';
      if(p.isSelf){ html+='<a class="btn ghost" href="/min-konto">Dette er deg, gå til Min konto</a>'; }
      else { html+='<button class="btn" id="send">Send melding</button>'; }
      html+='</div>';
      if(!p.isSelf) html+='<p class="muted">Starter en privat samtale mellom dere to.</p>';
      card.innerHTML=html;
      var btn=document.getElementById('send');
      if(btn) btn.addEventListener('click',function(){
        btn.disabled=true; btn.textContent='Åpner…';
        fetch('/api/group/conv/dm',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({withUid:uid})})
          .then(function(r){return r.json();})
          .then(function(d){ if(d&&d.id){ location.href='/meldinger?c='+d.id; } else { btn.disabled=false; btn.textContent='Send melding'; alert('Kunne ikke åpne samtalen.'); } })
          .catch(function(){ btn.disabled=false; btn.textContent='Send melding'; });
      });
    })
    .catch(function(){ card.innerHTML='<p class="muted">Noe gikk galt.</p>'; });
})();
</script>
</body>
</html>
