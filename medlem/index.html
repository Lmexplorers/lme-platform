<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medlem — Little Montessori Explorers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:'Sasson Montessori';src:url('/fonts/SassoonMontessori.woff2') format('woff2'),url('/fonts/SassoonMontessori.ttf') format('truetype');font-weight:normal;font-style:normal;font-display:swap;}
  :root{--cerise:#E91E89;--ink:#2a1e2e;--ink-soft:#6b5563;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sasson Montessori','Playpen Sans',system-ui,sans-serif;color:var(--ink);background:#faf6f7;}
  h1,h2,h3{font-family:'Playpen Sans',system-ui,sans-serif;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:13px 20px;background:#fff;box-shadow:0 2px 10px rgba(180,120,140,.12);}
  .bar .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cerise);text-decoration:none;font-size:15px;}
  .bar .brand img{width:32px;height:32px;object-fit:contain;}
  .bar a.lnk{color:var(--ink);text-decoration:none;border:1px solid #eedce2;border-radius:999px;padding:8px 16px;font-size:13.5px;font-weight:700;}
  .wrap{max-width:520px;margin:40px auto;padding:0 18px;}
  .card{background:#fff;border:1px solid #f3dce6;border-radius:22px;padding:36px 28px;text-align:center;box-shadow:0 10px 30px rgba(180,120,140,.12);}
  .ava{width:88px;height:88px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,#F5A8B8,#E91E89);color:#fff;display:flex;align-items:center;justify-content:center;font-size:38px;font-family:'Playpen Sans',sans-serif;font-style:italic;}
  h1{font-size:25px;margin-bottom:6px;}
  .badge{display:inline-block;font-size:12px;font-weight:700;color:var(--cerise);background:#FCEFF2;border-radius:999px;padding:4px 12px;margin-bottom:18px;}
  .btn{display:inline-block;background:var(--cerise);color:#fff;border:0;border-radius:999px;padding:12px 24px;font-weight:700;font-family:inherit;cursor:pointer;font-size:15px;text-decoration:none;}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid #eedce2;}
  .muted{color:var(--ink-soft);font-size:14.5px;line-height:1.5;margin-top:14px;}
</style>
</head>
<body>
  <div class="bar">
    <a class="brand" href="/grupper"><img src="/images/lme-logo.png" alt="LME">Little Montessori Explorers</a>
    <a class="lnk" href="/meldinger">Meldinger</a>
  </div>
  <div class="wrap"><div class="card" id="card"><p class="muted">Laster…</p></div></div>
<script>
(function(){
  var card=document.getElementById('card');
  function q(n){var m=location.search.match(new RegExp('[?&]'+n+'=([^&]+)'));return m?decodeURIComponent(m[1]):'';}
  var uid=q('u');
  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  if(!uid){ card.innerHTML='<p class="muted">Mangler medlem.</p>'; return; }

  fetch('/api/group/profile/'+encodeURIComponent(uid),{credentials:'same-origin'})
    .then(function(r){return r.json();})
    .then(function(p){
      if(!p || p.error){
        if(p && p.error==='forbidden'){ card.innerHTML='<p class="muted">Logg inn for å se profiler.</p><p style="margin-top:14px"><a class="btn" href="/login?next='+encodeURIComponent(location.pathname+location.search)+'">Logg inn</a></p>'; }
        else card.innerHTML='<p class="muted">Fant ikke dette medlemmet.</p>';
        return;
      }
      var initial=(p.name||'?').trim().charAt(0).toUpperCase();
      var avaHtml = p.avatar ? '<div class="ava" style="background-image:url('+esc(p.avatar)+');background-size:cover;background-position:center;"></div>' : '<div class="ava">'+esc(initial)+'</div>';
      var facts='';
      if(p.location) facts+='<p class="muted" style="margin-top:4px">📍 '+esc(p.location)+'</p>';
      if(p.kids) facts+='<p class="muted" style="margin-top:4px">👶 '+esc(p.kids)+'</p>';
      if(p.bio) facts+='<p style="margin-top:12px;font-size:15px;line-height:1.55;color:#2a1e2e;">'+esc(p.bio)+'</p>';

      if(p.isSelf){
        card.innerHTML=
          avaHtml+'<h1>'+esc(p.name)+'</h1>'+(p.member?'<div class="badge">Inner Circle-medlem</div>':'')+
          '<p class="muted" style="margin-bottom:14px">Dette er din profil. Fyll den ut, så blir det lettere for andre å bli kjent med deg.</p>'+
          '<div style="text-align:left;display:flex;flex-direction:column;gap:10px;">'+
            '<label class="muted" style="font-weight:700">Bilde</label>'+
            '<button class="btn ghost" id="ava-btn" type="button">Last opp bilde</button>'+
            '<input type="file" id="ava-file" accept="image/*" hidden>'+
            '<label class="muted" style="font-weight:700">Navn</label>'+
            '<input type="text" id="f-name" value="'+esc(p.name||'')+'" style="border:1px solid #eedce2;border-radius:12px;padding:10px 14px;font-family:inherit;font-size:15px;">'+
            '<label class="muted" style="font-weight:700">Sted</label>'+
            '<input type="text" id="f-loc" value="'+esc(p.location||'')+'" placeholder="F.eks. Tønsberg" style="border:1px solid #eedce2;border-radius:12px;padding:10px 14px;font-family:inherit;font-size:15px;">'+
            '<label class="muted" style="font-weight:700">Barnas alder</label>'+
            '<input type="text" id="f-kids" value="'+esc(p.kids||'')+'" placeholder="F.eks. 4 og 7 år" style="border:1px solid #eedce2;border-radius:12px;padding:10px 14px;font-family:inherit;font-size:15px;">'+
            '<label class="muted" style="font-weight:700">Om meg</label>'+
            '<textarea id="f-bio" placeholder="Skriv litt om deg selv" style="border:1px solid #eedce2;border-radius:12px;padding:10px 14px;font-family:inherit;font-size:15px;min-height:80px;">'+esc(p.bio||'')+'</textarea>'+
            '<button class="btn" id="f-save" type="button">Lagre profil</button>'+
            '<p class="muted" id="f-note" style="min-height:18px;text-align:center"></p>'+
          '</div>';
        var note=document.getElementById('f-note');
        document.getElementById('ava-btn').addEventListener('click',function(){document.getElementById('ava-file').click();});
        document.getElementById('ava-file').addEventListener('change',function(){ if(this.files[0]) uploadAvatar(this.files[0],note); this.value=''; });
        document.getElementById('f-save').addEventListener('click',function(){
          note.textContent='Lagrer…';
          fetch('/api/group/profile/save',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('f-name').value,location:document.getElementById('f-loc').value,kids:document.getElementById('f-kids').value,bio:document.getElementById('f-bio').value})})
            .then(function(r){return r.json();}).then(function(d){ note.textContent=(d&&d.ok)?'Lagret ✓':'Noe gikk galt.'; }).catch(function(){note.textContent='Noe gikk galt.';});
        });
        return;
      }

      var html=avaHtml+'<h1>'+esc(p.name)+'</h1>'+
        (p.member?'<div class="badge">Inner Circle-medlem</div>':'')+facts+
        '<div style="margin-top:16px"><button class="btn" id="send">Send melding</button></div>'+
        '<p class="muted" style="margin-top:10px">Starter en privat samtale mellom dere to.</p>';
      card.innerHTML=html;
      var btn=document.getElementById('send');
      if(btn) btn.addEventListener('click',function(){
        btn.disabled=true; btn.textContent='Åpner…';
        fetch('/api/group/conv/dm',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({withUid:uid})})
          .then(function(r){return r.json();})
          .then(function(d){ if(d&&d.id){ location.href='/meldinger?c='+d.id; } else { btn.disabled=false; btn.textContent='Send melding'; alert('Kunne ikke åpne samtalen.'); } })
          .catch(function(){ btn.disabled=false; btn.textContent='Send melding'; });
      });
    })
    .catch(function(){ card.innerHTML='<p class="muted">Noe gikk galt.</p>'; });

  function uploadAvatar(file,note){
    note.textContent='Laster opp bilde…';
    var go=function(blob,type){
      var r=new FileReader();
      r.onload=function(){ var s=String(r.result); var i=s.indexOf(','); var data=i>=0?s.slice(i+1):s;
        fetch('/api/group/profile/avatar',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:data,type:type})})
          .then(function(x){return x.json();}).then(function(d){ if(d&&d.ok){ note.textContent='Bilde lagret ✓'; location.reload(); } else if(d&&d.error==='too_large'){ note.textContent='Bildet er for stort (maks 3 MB).'; } else note.textContent='Noe gikk galt.'; }).catch(function(){note.textContent='Noe gikk galt.';});
      };
      r.readAsDataURL(blob);
    };
    // komprimer
    var img=new Image(); var url=URL.createObjectURL(file);
    img.onload=function(){ var max=400,w=img.width,h=img.height; if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} } var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);c.toBlob(function(b){go(b||file,'image/jpeg');},'image/jpeg',0.85); };
    img.onerror=function(){URL.revokeObjectURL(url);go(file,file.type||'image/jpeg');};
    img.src=url;
  }
})();
</script>
<script src="/js/lme-visibility.js" defer></script>
</body>
</html>
