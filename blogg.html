<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-no="Blogg | Little Montessori Explorers" data-en="Blog | Little Montessori Explorers">Blogg | Little Montessori Explorers</title>
<meta name="description" data-no="Tanker, tips og historier om Montessori, lek og læring fra Little Montessori Explorers." data-en="Thoughts, tips and stories about Montessori, play and learning from Little Montessori Explorers.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  @font-face{
    font-family:'Sasson Montessori';
    src:url('/fonts/SassoonMontessori.woff2') format('woff2'),
        url('/fonts/SassoonMontessori.ttf') format('truetype');
    font-weight:normal;font-style:normal;font-display:swap;
  }
  :root{
    --pink-50:#fff5f8;--pink-100:#ffe8f0;--pink-200:#ffd1e1;--pink-300:#ffb3cd;
    --pink-400:#ff8ab3;--pink-500:#e85a92;--pink-600:#c43d75;--pink-700:#8f2a55;
    --warm-white:#fffcf9;--ink:#3d2438;--ink-soft:#6b4760;--ink-muted:#9a8693;
    --line:#f0dde6;
    --shadow-soft:0 8px 32px rgba(196,61,117,.08);
    --shadow-med:0 16px 48px rgba(196,61,117,.14);
    --font-head:'Playpen Sans',system-ui,sans-serif;
    --font-body:'Sasson Montessori','Playpen Sans',system-ui,sans-serif;
    --r-md:18px;--r-lg:26px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);color:var(--ink);line-height:1.6;font-weight:400;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0,rgba(255,209,225,.32),transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 8%,rgba(255,232,240,.38),transparent 60%),
      var(--warm-white);
    min-height:100vh;
  }
  h1,h2,h3,h4{font-family:var(--font-head);font-weight:700;line-height:1.15;color:var(--ink);}

  .topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;
    padding:14px 26px;background:rgba(255,252,249,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .topbar .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);}
  .topbar .brand img{width:34px;height:34px;border-radius:9px;background:#fff;object-fit:contain;}
  .topbar .brand b{font-family:var(--font-head);font-weight:800;font-size:18px;letter-spacing:-.3px;}
  .topbar .spacer{flex:1;}
  .topbar a.back{color:var(--ink-soft);text-decoration:none;font-size:14px;}
  .topbar a.back:hover{color:var(--pink-600);}
  .lang-toggle{font-family:var(--font-head);font-weight:700;font-size:13px;border:1.5px solid var(--pink-200);
    background:#fff;color:var(--pink-600);border-radius:999px;padding:7px 14px;cursor:pointer;}

  .wrap{max-width:1100px;margin:0 auto;padding:36px 26px 90px;}
  .crumb{font-size:13px;color:var(--ink-muted);margin-bottom:14px;}
  .crumb a{color:var(--ink-muted);text-decoration:none;}

  .hero{margin-bottom:22px;}
  .hero h1{font-size:clamp(34px,6vw,54px);font-weight:800;letter-spacing:-1px;}
  .hero p{margin:12px 0 0;max-width:56ch;font-size:18px;color:var(--ink-soft);}

  .controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:26px 0 8px;}
  .search{position:relative;flex:1;min-width:220px;max-width:360px;}
  .search input{width:100%;font-family:var(--font-body);font-size:15px;color:var(--ink);
    border:1.5px solid var(--line);border-radius:999px;padding:11px 16px 11px 40px;background:#fff;}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink-muted);}

  .pills{display:flex;gap:9px;flex-wrap:wrap;margin:6px 0 30px;}
  .pill{font-family:var(--font-head);font-weight:700;font-size:13.5px;border:1.5px solid var(--pink-200);
    background:#fff;color:var(--pink-600);border-radius:999px;padding:8px 16px;cursor:pointer;white-space:nowrap;}
  .pill.active{background:linear-gradient(120deg,var(--pink-500),var(--pink-600));color:#fff;border-color:transparent;}

  .owner-bar{display:none;margin:0 0 24px;}
  .owner-bar.show{display:block;}
  .btn{font-family:var(--font-head);font-weight:700;font-size:15px;border:none;border-radius:999px;
    padding:12px 22px;cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:linear-gradient(120deg,var(--pink-500),var(--pink-600));color:#fff;
    box-shadow:0 10px 24px -10px rgba(196,61,117,.6);}
  .btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);}

  .demo-note{background:var(--pink-50);border:1px dashed var(--pink-300);border-radius:16px;
    padding:14px 18px;margin-bottom:26px;font-size:14.5px;color:var(--pink-700);}

  .section-title{font-size:15px;font-family:var(--font-head);font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink-muted);margin:0 0 16px;}

  /* Featured */
  .featured{display:grid;grid-template-columns:1.25fr 1fr;gap:26px;background:#fff;border-radius:var(--r-lg);
    overflow:hidden;box-shadow:var(--shadow-soft);margin-bottom:46px;text-decoration:none;color:inherit;
    transition:transform .25s,box-shadow .25s;}
  .featured:hover{transform:translateY(-4px);box-shadow:var(--shadow-med);}
  .featured .img{min-height:300px;background:linear-gradient(135deg,var(--pink-200),var(--pink-400));
    background-size:cover;background-position:center;}
  .featured .fbody{padding:34px 34px 34px 8px;display:flex;flex-direction:column;justify-content:center;}
  .featured .kicker{font-family:var(--font-head);font-weight:700;font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--pink-500);margin-bottom:12px;}
  .featured h2{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.12;}
  .featured .excerpt{margin-top:14px;font-size:16px;color:var(--ink-soft);line-height:1.6;}
  .featured .meta{margin-top:18px;font-size:13px;color:var(--ink-muted);}
  @media(max-width:760px){.featured{grid-template-columns:1fr;}.featured .fbody{padding:26px;}.featured h2{font-size:24px;}}

  .cat-section{margin-bottom:50px;}
  .cat-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;}
  .cat-head h2{font-size:23px;font-weight:700;}
  .cat-head .count{font-size:14px;color:var(--ink-muted);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:24px;}
  .card{position:relative;display:flex;flex-direction:column;background:#fff;border-radius:var(--r-lg);
    overflow:hidden;box-shadow:var(--shadow-soft);text-decoration:none;color:inherit;
    transition:transform .25s ease,box-shadow .25s ease;}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-med);}
  .card .thumb{aspect-ratio:3/2;background:linear-gradient(135deg,var(--pink-200),var(--pink-400));
    background-size:cover;background-position:center;}
  .card .body{padding:20px 20px 22px;display:flex;flex-direction:column;flex:1;}
  .card .kicker{font-family:var(--font-head);font-weight:700;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--pink-500);margin-bottom:8px;}
  .card h3{font-size:19px;font-weight:700;margin-bottom:8px;}
  .card .excerpt{font-size:14.5px;color:var(--ink-soft);line-height:1.55;flex:1;}
  .card .meta{margin-top:14px;font-size:12.5px;color:var(--ink-muted);}
  .badge-demo{position:absolute;top:12px;left:12px;background:rgba(255,252,249,.92);color:var(--pink-600);
    font-family:var(--font-head);font-weight:700;font-size:11px;border-radius:999px;padding:5px 11px;box-shadow:var(--shadow-soft);}
  .card .admin{position:absolute;top:10px;right:10px;display:none;gap:6px;}
  .owner-mode .card .admin{display:flex;}
  .card .admin button{font-family:var(--font-head);font-weight:700;font-size:12px;border:none;border-radius:999px;
    padding:6px 11px;cursor:pointer;box-shadow:0 4px 12px -4px rgba(0,0,0,.35);}
  .card .admin .edit{background:#fff;color:var(--pink-600);}
  .card .admin .del{background:#fff;color:#c0392b;}

  .empty{text-align:center;color:var(--ink-muted);padding:30px 0;font-size:16px;}

  /* Editor modal */
  .modal{position:fixed;inset:0;z-index:200;display:none;align-items:flex-start;justify-content:center;
    background:rgba(61,36,56,.45);backdrop-filter:blur(4px);overflow-y:auto;padding:30px 16px;}
  .modal.show{display:flex;}
  /* Skjul flytende knapper (Spor Renate AI, Gjor synlig) mens redigeringsvinduet er aapent,
     saa de ikke dekker Lagre-knappen paa mobil. */
  body.editing .rw-root, body.editing .lme-vis-fab { display:none !important; }
  .sheet{width:100%;max-width:760px;background:var(--warm-white);border-radius:var(--r-lg);
    box-shadow:var(--shadow-med);padding:28px;margin:auto;}
  .sheet h2{font-size:22px;margin-bottom:4px;}
  .sheet .hint{font-size:13px;color:var(--ink-muted);margin-bottom:18px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:var(--font-head);font-weight:700;font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  .field input,.field textarea{width:100%;font-family:var(--font-body);font-size:15px;color:var(--ink);
    border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;background:#fff;}
  .field textarea{resize:vertical;min-height:64px;}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .ed-toolbar{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
  .ed-toolbar button{font-family:var(--font-head);font-weight:700;font-size:12px;border:1.5px solid var(--line);
    background:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;color:var(--ink-soft);}
  .rich{min-height:150px;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff;
    font-size:15px;line-height:1.6;}
  .rich:focus{outline:2px solid var(--pink-200);}
  .sheet-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
  @media(max-width:620px){.two{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/dashboard">
    <img src="/images/lme-logo.png" alt="LME">
    <b>Little Montessori Explorers</b>
  </a>
  <span class="spacer"></span>
  <a class="back" href="/dashboard" data-no="Tilbake til dashbord" data-en="Back to dashboard">Tilbake til dashbord</a>
  <button class="lang-toggle" id="langToggle">EN 🌍</button>
</div>

<div class="wrap">
  <div class="crumb"><a href="/dashboard" data-no="Hjem" data-en="Home">Hjem</a> / <span data-no="Blogg" data-en="Blog">Blogg</span></div>

  <div class="hero">
    <h1 data-no="Blogg" data-en="Blog">Blogg</h1>
    <p data-no="Montessori, lek og læring i hverdagen. Inspirasjon og praktiske råd fra Renate og Little Montessori Explorers."
       data-en="Montessori, play and learning in everyday life. Inspiration and practical advice from Renate and Little Montessori Explorers.">Montessori, lek og læring i hverdagen.</p>
  </div>

  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
      <input id="searchInput" type="text" data-no-ph="Søk i alle innlegg" data-en-ph="Search all articles" placeholder="Søk i alle innlegg">
    </div>
  </div>
  <div class="pills" id="pills"></div>

  <div class="owner-bar" id="ownerBar">
    <button class="btn btn-primary" id="newPostBtn" data-no="+ Nytt innlegg" data-en="+ New post">+ Nytt innlegg</button>
  </div>

  <div class="demo-note" id="demoNote" style="display:none;"
       data-no="Dette er eksempler så du ser hvordan bloggen blir. Trykk Ctrl/Cmd + Shift + E eller legg #rediger i adressen for å skrive dine egne innlegg."
       data-en="These are examples so you can see how the blog looks. Press Ctrl/Cmd + Shift + E or add #rediger to the address to write your own posts.">Eksempler.</div>

  <div id="featuredWrap"></div>
  <div id="sections"></div>
  <div class="empty" id="emptyState" style="display:none;"
       data-no="Ingen treff." data-en="No results.">Ingen treff.</div>
</div>

<!-- Editor -->
<div class="modal" id="editor">
  <div class="sheet">
    <h2 id="edTitle" data-no="Nytt innlegg" data-en="New post">Nytt innlegg</h2>
    <div class="hint" data-no="Fyll inn på norsk og engelsk. Bildelenke kan være en sti som /images/hero_learning_tree.webp eller en full nettadresse."
         data-en="Fill in Norwegian and English. The image link can be a path like /images/hero_learning_tree.webp or a full URL.">…</div>

    <div class="field" id="aiBox" style="background:#FFF4F6;border:1.5px dashed #F5A8B8;border-radius:14px;padding:14px 16px">
      <label data-no="✨ La KI lage utkastet for deg" data-en="✨ Let AI draft it for you">✨ La KI lage utkastet for deg</label>
      <input id="f-aiTopic" type="text"
             data-no-ph="Hva skal innlegget handle om? F.eks. ro i samlingsstunden"
             data-en-ph="What should the post be about? E.g. calm circle time"
             placeholder="Hva skal innlegget handle om? F.eks. ro i samlingsstunden">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
        <button class="btn btn-primary" type="button" id="ai-text" data-no="✨ Skriv innlegget" data-en="✨ Write the post">✨ Skriv innlegget</button>
        <button class="btn btn-ghost" type="button" id="ai-image" data-no="🎨 Lag toppbilde" data-en="🎨 Create header image">🎨 Lag toppbilde</button>
      </div>
      <div style="margin-top:12px;display:grid;gap:8px">
        <div>
          <label data-no="Beskriv toppbildet (hva skal skje i bildet)" data-en="Describe the header image (what happens in it)">Beskriv toppbildet (hva skal skje i bildet)</label>
          <input id="f-imgDesc" type="text"
                 data-no-ph="F.eks. et barn som heller vann ved et lite kjøkkenbord i morgenlys"
                 data-en-ph="E.g. a child pouring water at a small kitchen table in morning light"
                 placeholder="F.eks. et barn som heller vann ved et lite kjøkkenbord i morgenlys">
          <select id="f-imgMat" style="margin-top:6px">
            <option value="" data-no="＋ Sett inn kjent Montessorimateriell …" data-en="＋ Insert a known Montessori material …">＋ Sett inn kjent Montessorimateriell …</option>
            <optgroup label="Sansemateriell">
              <option data-desc="det rosa tårnet, ti rosa kuber stablet fra størst nederst til minst øverst">Det rosa tårnet</option>
              <option data-desc="den brune trappa, ti brune treprismer lagt som en trapp fra tykkest til tynnest">Den brune trappa</option>
              <option data-desc="de røde stengene, ti røde trestenger i økende lengde lagt fra lengst til kortest">De røde stengene</option>
              <option data-desc="sylinderblokkene, treblokker med en rad innfelte sylindere i ulike størrelser, hver med en liten knott å holde i">Sylinderblokkene</option>
              <option data-desc="de fargede sylindrene, fire sett sylindere uten knott i rødt, gult, grønt og blått, gradert i størrelse">De fargede sylindrene</option>
              <option data-desc="fargebrettene, små innrammede fargebrett ordnet parvis og i nyanser fra lys til mørk i en treeske">Fargebrettene</option>
              <option data-desc="den geometriske kommoden, en lav trekommode med flate skuffer fulle av innfelte geometriske former med små knotter">Den geometriske kommoden</option>
              <option data-desc="lydsylindrene, to sett små sylindere med rødt og blått lokk som ristes for å finne like lyder">Lydsylindrene</option>
              <option data-desc="binomialkuben, en trekube bygd av røde, blå og svarte klosser i et fast mønster, i en treboks med lokk">Binomialkuben</option>
            </optgroup>
            <optgroup label="Språk">
              <option data-desc="sandpapirbokstaver, kort med enkeltbokstaver skåret i ru sandpapir på rosa og blå bakgrunn, som et barn følger med fingeren">Sandpapirbokstaver</option>
              <option data-desc="det bevegelige alfabetet, en flat treboks med rom fulle av små løse bokstaver, konsonanter i rødt og vokaler i blått">Det bevegelige alfabetet</option>
              <option data-desc="metallformene, innfelte metallformer i geometriske figurer med små knotter, brukt til å tegne rundt på papir">Metallformene</option>
            </optgroup>
            <optgroup label="Matematikk">
              <option data-desc="de røde og blå tallstengene, trestenger delt i vekslende røde og blå felt, lagt fra kortest til lengst">Tallstengene (røde og blå)</option>
              <option data-desc="spindelesken, en trekasse med rom merket 0 til 9, med bunter av tynne trepinner som telles i hvert rom">Spindelesken</option>
              <option data-desc="sandpapirtall, kort med enkelttall skåret i ru sandpapir på grønn bakgrunn, som et barn følger med fingeren">Sandpapirtall</option>
              <option data-desc="perletrappen, korte perlestenger fra én til ti perler i ulike farger, lagt ved siden av hverandre som en trapp">Perletrappen</option>
              <option data-desc="det gylne perlematerialet, gylne perler som enkeltperler, tierstenger, hundreflater og en tusenkube lagt pent på en arbeidsmatte">Det gylne perlematerialet</option>
              <option data-desc="frimerkespillet, små firkantede brikker i matt naturtre lagt i loddrette kolonner på en arbeidsmatte etter plassverdi, grønne brikker for enere, blå for tiere, røde for hundrere og grønne for tusener, med en flat treboks med rom for brikkene ved siden av, alt i tre og ikke plast">Frimerkespillet</option>
              <option data-desc="hundrekjeden, en lang kjede av ti gylne tierstenger lagt utover gulvet og talt til hundre">Hundrekjeden</option>
              <option data-desc="hundretavla, en trebrikke med rutenett og små brikker med tallene 1 til 100 som legges i rekkefølge">Hundretavla</option>
            </optgroup>
            <optgroup label="Kultur og geografi">
              <option data-desc="puslespillkartet, et trekart der hvert land er en egen brikke med en liten knott, i klare farger">Puslespillkartet</option>
              <option data-desc="den taktile globusen, der kontinentene er ru og havet glatt, eller kontinentene i hver sin farge">Den taktile globusen</option>
              <option data-desc="bladkabinettet, innfelte trebrikker som viser ulike bladformer, hver med en liten knott">Bladkabinettet</option>
              <option data-desc="landformene, små skåler som viser øy og innsjø, klare til å helle vann i">Landformene</option>
            </optgroup>
            <optgroup label="Praktisk liv">
              <option data-desc="praktisk liv, et lite trebrett med to små mugger for å helle vann, med en liten svamp ved siden av">Helle vann</option>
              <option data-desc="praktisk liv, en ramme med knapper som et barn øver på å kneppe og løsne">Knappe-ramme</option>
              <option data-desc="praktisk liv, et brett med en liten kanne, en skål og en klut for å vaske hender eller pusse">Vaske og pusse</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label data-no="Hvem skal være med?" data-en="Who should be in it?">Hvem skal være med?</label>
          <select id="f-imgCast">
            <option value="ingen" data-no="Ingen figurer, bare scene" data-en="No characters, just the scene">Ingen figurer, bare scene</option>
            <option value="mia_teo" data-no="Mia og Teo" data-en="Mia and Teo">Mia og Teo</option>
            <option value="andre" data-no="Andre barn" data-en="Other children">Andre barn</option>
          </select>
        </div>
        <div>
          <label data-no="📷 Eller last opp ditt eget foto (alltid riktig materiell)" data-en="📷 Or upload your own photo (always the right material)">📷 Eller last opp ditt eget foto (alltid riktig materiell)</label>
          <input type="file" id="f-imgUpload" accept="image/*" style="font-size:13px">
          <div class="hint" data-no="Ta bilde med telefonen eller velg fra galleriet. Den sikre veien for spesifikt materiell som AI ikke klarer å lage." data-en="Take a photo with your phone or pick from the gallery. The safe route for specific materials AI can't render.">Ta bilde med telefonen eller velg fra galleriet.</div>
        </div>
      </div>

      <div class="hint" id="aiStatus" style="margin:8px 0 0"
           data-no="Teksten kommer på både norsk og engelsk, klar til å leses over og lagres."
           data-en="The text arrives in both Norwegian and English, ready to review and save.">Teksten kommer på både norsk og engelsk, klar til å leses over og lagres.</div>
    </div>

    <div class="field two">
      <div><label data-no="Tittel (norsk)" data-en="Title (Norwegian)">Tittel (norsk)</label><input id="f-titleNo" type="text"></div>
      <div><label data-no="Tittel (engelsk)" data-en="Title (English)">Tittel (engelsk)</label><input id="f-titleEn" type="text"></div>
    </div>
    <div class="field two">
      <div><label data-no="Kategori" data-en="Category">Kategori</label><input id="f-category" type="text" placeholder="Tips &amp; råd"></div>
      <div><label data-no="Lesetid (f.eks. 4 min)" data-en="Read time (e.g. 4 min)">Lesetid</label><input id="f-readMin" type="text" placeholder="4 min"></div>
    </div>
    <div class="field two">
      <div><label data-no="Bildelenke" data-en="Image link">Bildelenke</label><input id="f-image" type="text" placeholder="/images/hero_learning_tree.webp"></div>
      <div><label data-no="Dato" data-en="Date">Dato</label><input id="f-date" type="date"></div>
    </div>
    <div class="field"><label data-no="Ingress (norsk)" data-en="Excerpt (Norwegian)">Ingress (norsk)</label><textarea id="f-excerptNo"></textarea></div>
    <div class="field"><label data-no="Ingress (engelsk)" data-en="Excerpt (English)">Ingress (engelsk)</label><textarea id="f-excerptEn"></textarea></div>

    <div class="field">
      <label data-no="Brødtekst (norsk)" data-en="Body (Norwegian)">Brødtekst (norsk)</label>
      <div class="ed-toolbar" data-target="f-bodyNo">
        <button type="button" data-cmd="bold"><b>B</b></button><button type="button" data-cmd="italic"><i>I</i></button>
        <button type="button" data-cmd="h3" data-no="Tittel" data-en="Heading">Tittel</button>
        <button type="button" data-cmd="ul" data-no="Liste" data-en="List">Liste</button>
        <button type="button" data-cmd="link" data-no="Lenke" data-en="Link">Lenke</button>
      </div>
      <div class="rich" id="f-bodyNo" contenteditable="true"></div>
    </div>
    <div class="field">
      <label data-no="Brødtekst (engelsk)" data-en="Body (English)">Brødtekst (engelsk)</label>
      <div class="ed-toolbar" data-target="f-bodyEn">
        <button type="button" data-cmd="bold"><b>B</b></button><button type="button" data-cmd="italic"><i>I</i></button>
        <button type="button" data-cmd="h3" data-no="Tittel" data-en="Heading">Tittel</button>
        <button type="button" data-cmd="ul" data-no="Liste" data-en="List">Liste</button>
        <button type="button" data-cmd="link" data-no="Lenke" data-en="Link">Lenke</button>
      </div>
      <div class="rich" id="f-bodyEn" contenteditable="true"></div>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="ed-cancel" data-no="Avbryt" data-en="Cancel">Avbryt</button>
      <button class="btn btn-primary" id="ed-save" data-no="Lagre innlegg" data-en="Save post">Lagre innlegg</button>
    </div>
  </div>
</div>

<script>
(function(){
  var lang='no', posts=[], isDemo=false, activeCat='__all__', query='', editingId=null, pw=null;

  var DEMO=[
    {id:'demo1',category:'Montessori hjemme',categoryEn:'Montessori at home',readMin:'5 min',date:'2026-06-10',
     image:'/images/courses/course_praktisk_liv.webp',
     titleNo:'Praktisk liv: der alt starter',titleEn:'Practical life: where it all begins',
     excerptNo:'Hvordan enkle hverdagsoppgaver gir barnet selvstendighet, konsentrasjon og mestring.',
     excerptEn:'How simple everyday tasks give the child independence, concentration and mastery.'},
    {id:'demo2',category:'Lek & læring',categoryEn:'Play & learning',readMin:'4 min',date:'2026-06-05',
     image:'/images/hero_learning_tree.webp',
     titleNo:'Naturen som klasserom',titleEn:'Nature as a classroom',
     excerptNo:'Ute finnes matematikk, språk og vitenskap overalt. Slik følger du barnets nysgjerrighet.',
     excerptEn:'Outdoors, maths, language and science are everywhere. How to follow their curiosity.'},
    {id:'demo3',category:'Historier',categoryEn:'Stories',readMin:'6 min',date:'2026-05-28',
     image:'/images/eventyr/pinnsvin.webp',
     titleNo:'Pinnsvinet i hagen',titleEn:'The hedgehog in the garden',
     excerptNo:'En liten fortelling om Mia og Teo som møter et pinnsvin, og om å vente og undre seg.',
     excerptEn:'A little story about Mia and Teo meeting a hedgehog, and about waiting and wondering.'},
    {id:'demo4',category:'Lek & læring',categoryEn:'Play & learning',readMin:'3 min',date:'2026-05-20',
     image:'/images/courses/course_kosestund.webp',
     titleNo:'Rolig stund før leggetid',titleEn:'A calm moment before bed',
     excerptNo:'Faste, rolige holdepunkter på kvelden hjelper barnet å lande. Her er en enkel rytme.',
     excerptEn:'Steady, calm anchors in the evening help the child settle. Here is a simple rhythm.'}
  ];

  function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function catOf(p){ return (lang==='no'? (p.category||'') : (p.categoryEn||p.category||'')).trim(); }
  function pick(p,base){ return p[base+(lang==='no'?'No':'En')] || p[base+(lang==='no'?'En':'No')] || ''; }
  function fmtDate(d){
    if(!d) return ''; var parts=(''+d).split('-'); if(parts.length<3) return d;
    var mno=['jan','feb','mars','apr','mai','juni','juli','aug','sep','okt','nov','des'];
    var men=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var m=(lang==='no'?mno:men)[parseInt(parts[1],10)-1]||'';
    return parseInt(parts[2],10)+'. '+m+' '+parts[0];
  }

  function applyStatic(){
    document.querySelectorAll('[data-no][data-en]').forEach(function(el){
      var t=el.getAttribute('data-'+lang); if(t==null)return;
      if(/[<&]/.test(t))el.innerHTML=t; else el.textContent=t;
    });
    var si=document.getElementById('searchInput');
    si.setAttribute('placeholder', si.getAttribute('data-'+lang+'-ph')||'');
  }

  function cardHTML(p){
    var thumb = p.image ? '<div class="thumb" style="background-image:url(\''+esc(p.image)+'\')"></div>' : '<div class="thumb"></div>';
    var meta = fmtDate(p.date) + (p.readMin? ' · '+esc(p.readMin):'');
    var demoBadge = isDemo ? '<span class="badge-demo">'+(lang==='no'?'Eksempel':'Example')+'</span>' : '';
    var admin = !isDemo ? '<div class="admin"><button class="edit" type="button" data-id="'+esc(p.id)+'">'+(lang==='no'?'Rediger':'Edit')+
       '</button><button class="del" type="button" data-id="'+esc(p.id)+'">'+(lang==='no'?'Slett':'Delete')+'</button></div>' : '';
    var href = isDemo ? 'javascript:void(0)' : (p.url || '/blogg/les?id='+encodeURIComponent(p.id));
    return '<a class="card" href="'+href+'">'+demoBadge+thumb+
      '<div class="body"><div class="kicker">'+esc(catOf(p))+'</div><h3>'+esc(pick(p,'title'))+
      '</h3><div class="excerpt">'+esc(pick(p,'excerpt'))+'</div><div class="meta">'+meta+'</div></div>'+admin+'</a>';
  }

  function matchesQuery(p){
    if(!query) return true;
    var hay=(pick(p,'title')+' '+pick(p,'excerpt')+' '+catOf(p)).toLowerCase();
    return hay.indexOf(query.toLowerCase())>=0;
  }

  function render(){
    var list=posts.slice().filter(matchesQuery);
    // pills
    var cats=[]; list.forEach(function(p){var c=catOf(p)||(lang==='no'?'Annet':'Other'); if(cats.indexOf(c)<0)cats.push(c);});
    var pillsEl=document.getElementById('pills');
    var ph='<button class="pill'+(activeCat==='__all__'?' active':'')+'" data-cat="__all__">'+(lang==='no'?'Alle':'All')+'</button>';
    cats.forEach(function(c){ ph+='<button class="pill'+(activeCat===c?' active':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</button>'; });
    pillsEl.innerHTML=ph;
    pillsEl.querySelectorAll('.pill').forEach(function(b){ b.addEventListener('click',function(){ activeCat=b.getAttribute('data-cat'); render(); }); });

    var visible = list.filter(function(p){ return activeCat==='__all__' || catOf(p)===activeCat; });
    var fWrap=document.getElementById('featuredWrap');
    var secWrap=document.getElementById('sections');
    var empty=document.getElementById('emptyState');
    fWrap.innerHTML=''; secWrap.innerHTML='';

    if(!visible.length){ empty.style.display='block'; return; }
    empty.style.display='none';

    var rest=visible.slice();
    // Featured only on "Alle" without search
    if(activeCat==='__all__' && !query && visible.length){
      var f=visible[0]; rest=visible.slice(1);
      var fimg=f.image?'<div class="img" style="background-image:url(\''+esc(f.image)+'\')"></div>':'<div class="img"></div>';
      var fhref=isDemo?'javascript:void(0)':(f.url || '/blogg/les?id='+encodeURIComponent(f.id));
      fWrap.innerHTML='<div class="section-title">'+(lang==='no'?'Utvalgt':'Featured')+'</div>'+
        '<a class="featured" href="'+fhref+'">'+fimg+'<div class="fbody"><div class="kicker">'+esc(catOf(f))+
        '</div><h2>'+esc(pick(f,'title'))+'</h2><div class="excerpt">'+esc(pick(f,'excerpt'))+
        '</div><div class="meta">'+fmtDate(f.date)+(f.readMin?' · '+esc(f.readMin):'')+'</div></div></a>';
    }

    // group rest by category
    var order=[], byCat={};
    rest.forEach(function(p){var c=catOf(p)||(lang==='no'?'Annet':'Other'); if(!byCat[c]){byCat[c]=[];order.push(c);} byCat[c].push(p);});
    order.forEach(function(c){
      var sec=document.createElement('div'); sec.className='cat-section';
      sec.innerHTML='<div class="cat-head"><h2>'+esc(c)+'</h2><span class="count">'+byCat[c].length+'</span></div>';
      var grid=document.createElement('div'); grid.className='grid';
      grid.innerHTML=byCat[c].map(cardHTML).join('');
      sec.appendChild(grid); secWrap.appendChild(sec);
    });

    // admin handlers
    if(!isDemo){
      secWrap.querySelectorAll('.admin .edit').forEach(function(b){b.addEventListener('click',function(e){e.preventDefault();openEditor(b.getAttribute('data-id'));});});
      secWrap.querySelectorAll('.admin .del').forEach(function(b){b.addEventListener('click',function(e){e.preventDefault();delPost(b.getAttribute('data-id'));});});
    }
  }

  function load(){
    fetch('/api/blog').then(function(r){return r.json();}).then(function(d){
      var real=(d&&d.posts)||[];
      if(real.length){ posts=real; isDemo=false; document.getElementById('demoNote').style.display='none'; }
      else { posts=DEMO; isDemo=true; document.getElementById('demoNote').style.display='block'; }
      render();
    }).catch(function(){ posts=DEMO; isDemo=true; document.getElementById('demoNote').style.display='block'; render(); });
  }

  function switchLanguage(l){
    lang=l; document.documentElement.lang=l; applyStatic();
    document.getElementById('langToggle').textContent=l==='no'?'EN 🌍':'NO 🇳🇴';
    render();
  }
  document.getElementById('langToggle').addEventListener('click',function(){switchLanguage(lang==='no'?'en':'no');});
  document.getElementById('searchInput').addEventListener('input',function(e){query=e.target.value.trim();activeCat='__all__';render();});

  /* editor */
  function ensurePw(){ if(pw)return pw; pw=prompt(lang==='no'?'Skriv inn passord for å lagre:':'Enter password to save:'); return pw; }
  function openEditor(id){
    editingId=id||null; var p={};
    if(id){ for(var i=0;i<posts.length;i++){ if(posts[i].id===id){p=posts[i];break;} } }
    document.getElementById('f-titleNo').value=p.titleNo||'';
    document.getElementById('f-titleEn').value=p.titleEn||'';
    document.getElementById('f-category').value=p.category||'';
    document.getElementById('f-readMin').value=p.readMin||'';
    document.getElementById('f-image').value=p.image||'';
    document.getElementById('f-date').value=p.date|| new Date().toISOString().slice(0,10);
    document.getElementById('f-excerptNo').value=p.excerptNo||'';
    document.getElementById('f-excerptEn').value=p.excerptEn||'';
    document.getElementById('f-bodyNo').innerHTML=''; document.getElementById('f-bodyEn').innerHTML='';
    if(id){ fetch('/api/blog?action=post&id='+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(d){
      if(d&&d.post){document.getElementById('f-bodyNo').innerHTML=d.post.bodyNo||'';document.getElementById('f-bodyEn').innerHTML=d.post.bodyEn||'';} }); }
    document.getElementById('edTitle').textContent = id? (lang==='no'?'Rediger innlegg':'Edit post') : (lang==='no'?'Nytt innlegg':'New post');
    document.getElementById('editor').classList.add('show');
    document.body.classList.add('editing');
  }
  function closeEditor(){ document.getElementById('editor').classList.remove('show'); document.body.classList.remove('editing'); editingId=null; }
  document.getElementById('newPostBtn').addEventListener('click',function(){openEditor(null);});
  document.getElementById('ed-cancel').addEventListener('click',closeEditor);

  document.querySelectorAll('.ed-toolbar').forEach(function(bar){
    var targetId=bar.getAttribute('data-target');
    bar.querySelectorAll('button').forEach(function(btn){
      btn.addEventListener('click',function(){
        var cmd=btn.getAttribute('data-cmd'); document.getElementById(targetId).focus();
        if(cmd==='bold')document.execCommand('bold');
        else if(cmd==='italic')document.execCommand('italic');
        else if(cmd==='h3')document.execCommand('formatBlock',false,'h3');
        else if(cmd==='ul')document.execCommand('insertUnorderedList');
        else if(cmd==='link'){var u=prompt('URL:','https://');if(u)document.execCommand('createLink',false,u);}
      });
    });
  });

  /* KI-generering: tekst og toppbilde. Fyller feltene; Renate leser over og lagrer. */
  var lastImagePrompt='';
  function aiStatus(no,en){ document.getElementById('aiStatus').textContent = lang==='no'?no:en; }
  document.getElementById('ai-text').addEventListener('click',function(){
    var topic=document.getElementById('f-aiTopic').value.trim();
    if(!topic){ alert(lang==='no'?'Skriv først hva innlegget skal handle om.':'First write what the post should be about.'); return; }
    var p=ensurePw(); if(!p) return;
    var btn=this; btn.disabled=true;
    aiStatus('✍️ Skriver innlegget, det tar gjerne et halvt minutt …','✍️ Writing the post, this usually takes half a minute …');
    fetch('/api/blog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'generate',password:p,topic:topic})})
    .then(function(r){return r.json();}).then(function(d){
      btn.disabled=false;
      if(d&&d.ok&&d.draft){
        var dr=d.draft;
        document.getElementById('f-titleNo').value=dr.titleNo||'';
        document.getElementById('f-titleEn').value=dr.titleEn||'';
        document.getElementById('f-excerptNo').value=dr.excerptNo||'';
        document.getElementById('f-excerptEn').value=dr.excerptEn||'';
        if(dr.category)document.getElementById('f-category').value=dr.category;
        if(dr.readMin)document.getElementById('f-readMin').value=dr.readMin;
        document.getElementById('f-bodyNo').innerHTML=dr.bodyNo||'';
        document.getElementById('f-bodyEn').innerHTML=dr.bodyEn||'';
        lastImagePrompt=dr.imagePrompt||'';
        aiStatus('✅ Utkastet er klart! Les over, juster det du vil, og trykk "Lag toppbilde" om du vil ha bilde.','✅ The draft is ready! Review it, adjust anything, and press "Create header image" if you want one.');
      } else if(d&&d.error==='bad_password'){ pw=null; aiStatus('Feil passord. Prøv igjen.','Wrong password. Try again.'); }
      else { var det2=(d&&d.detail)?' ('+d.detail+')':''; aiStatus('Fikk ikke skrevet innlegget: '+((d&&d.error)||'?')+det2+'. Prøv igjen.','Could not write the post: '+((d&&d.error)||'?')+det2+'. Try again.'); }
    }).catch(function(){ btn.disabled=false; aiStatus('Nettverksfeil. Prøv igjen.','Network error. Try again.'); });
  });
  document.getElementById('ai-image').addEventListener('click',function(){
    var topic=document.getElementById('f-aiTopic').value.trim();
    var desc=document.getElementById('f-imgDesc').value.trim();
    var cast=document.getElementById('f-imgCast').value;
    var prompt=desc || lastImagePrompt || document.getElementById('f-titleEn').value.trim() || document.getElementById('f-titleNo').value.trim() || topic;
    if(!prompt){ alert(lang==='no'?'Beskriv bildet, eller skriv et tema først.':'Describe the image, or write a topic first.'); return; }
    var p=ensurePw(); if(!p) return;
    var btn=this; btn.disabled=true;
    aiStatus('🎨 Lager toppbildet, det tar gjerne ett minutt …','🎨 Creating the header image, this usually takes a minute …');
    fetch('/api/blog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'generate-image',password:p,prompt:prompt,cast:cast})})
    .then(function(r){return r.json();}).then(function(d){
      btn.disabled=false;
      if(d&&d.ok&&d.url){
        document.getElementById('f-image').value=d.url;
        aiStatus('✅ Toppbildet er klart og lagt inn som bildelenke. Lagre innlegget for å se det på bloggen.','✅ The header image is ready and set as the image link. Save the post to see it on the blog.');
      } else if(d&&d.error==='bad_password'){ pw=null; aiStatus('Feil passord. Prøv igjen.','Wrong password. Try again.'); }
      else { var det=(d&&d.detail)?' ('+d.detail+')':''; aiStatus('Fikk ikke laget bildet: '+((d&&d.error)||'?')+det+'. Prøv igjen.','Could not create the image: '+((d&&d.error)||'?')+det+'. Try again.'); }
    }).catch(function(){ btn.disabled=false; aiStatus('Nettverksfeil. Prøv igjen.','Network error. Try again.'); });
  });

  /* Last opp eget foto: krymp i nettleseren og lagre via API, sett som bildelenke. */
  document.getElementById('f-imgUpload').addEventListener('change',function(){
    var file=this.files&&this.files[0]; var self=this; if(!file) return;
    var p=ensurePw(); if(!p){ self.value=''; return; }
    aiStatus('📷 Laster opp bildet …','📷 Uploading the image …');
    var img=new Image(); var url=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(url);
      var max=1600, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      var dataUrl=c.toDataURL('image/jpeg',0.85);
      fetch('/api/blog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'upload-image',password:p,dataUrl:dataUrl})})
      .then(function(r){return r.json();}).then(function(d){
        if(d&&d.ok&&d.url){ document.getElementById('f-image').value=d.url; aiStatus('✅ Bildet er lastet opp og lagt inn som bildelenke. Lagre innlegget for å se det.','✅ Image uploaded and set as the image link. Save the post to see it.'); }
        else if(d&&d.error==='bad_password'){ pw=null; aiStatus('Feil passord. Prøv igjen.','Wrong password. Try again.'); }
        else { aiStatus('Fikk ikke lastet opp bildet: '+((d&&d.error)||'?'),'Could not upload the image: '+((d&&d.error)||'?')); }
      }).catch(function(){ aiStatus('Nettverksfeil ved opplasting.','Network error while uploading.'); });
    };
    img.onerror=function(){ URL.revokeObjectURL(url); aiStatus('Kunne ikke lese bildefila.','Could not read the image file.'); };
    img.src=url; self.value='';
  });

  /* Materiell-velger: setter en utseende-beskrivelse inn i bildebeskrivelsen. */
  document.getElementById('f-imgMat').addEventListener('change',function(){
    var d=this.options[this.selectedIndex].getAttribute('data-desc');
    if(d){ var f=document.getElementById('f-imgDesc'); f.value=f.value.trim()? (f.value.trim().replace(/[.,]\s*$/,'')+', '+d) : d; }
    this.selectedIndex=0;
  });

  document.getElementById('ed-save').addEventListener('click',function(){
    var p=ensurePw(); if(!p) return; var btn=document.getElementById('ed-save');
    var post={ id:editingId||'',
      titleNo:document.getElementById('f-titleNo').value.trim(), titleEn:document.getElementById('f-titleEn').value.trim(),
      category:document.getElementById('f-category').value.trim(), readMin:document.getElementById('f-readMin').value.trim(),
      image:document.getElementById('f-image').value.trim(), date:document.getElementById('f-date').value.trim(),
      excerptNo:document.getElementById('f-excerptNo').value.trim(), excerptEn:document.getElementById('f-excerptEn').value.trim(),
      bodyNo:document.getElementById('f-bodyNo').innerHTML, bodyEn:document.getElementById('f-bodyEn').innerHTML };
    if(!post.titleNo && !post.titleEn){ alert(lang==='no'?'Skriv minst en tittel.':'Add at least a title.'); return; }
    btn.disabled=true; btn.textContent=lang==='no'?'Lagrer…':'Saving…';
    fetch('/api/blog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',password:p,post:post})})
    .then(function(r){return r.json();}).then(function(d){
      btn.disabled=false; btn.textContent=lang==='no'?'Lagre innlegg':'Save post';
      if(d&&d.ok){ closeEditor(); load(); }
      else if(d&&d.error==='bad_password'){ pw=null; alert(lang==='no'?'Feil passord.':'Wrong password.'); }
      else alert((lang==='no'?'Kunne ikke lagre: ':'Could not save: ')+((d&&d.error)||'?'));
    }).catch(function(){btn.disabled=false;btn.textContent='Lagre';alert('Nettverksfeil');});
  });

  function delPost(id){
    if(!confirm(lang==='no'?'Slette dette innlegget?':'Delete this post?')) return;
    var p=ensurePw(); if(!p) return;
    fetch('/api/blog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',password:p,id:id})})
    .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok) load(); else if(d&&d.error==='bad_password'){pw=null;alert(lang==='no'?'Feil passord.':'Wrong password.');} else alert('?'); });
  }

  /* owner reveal */
  function revealOwner(){ document.getElementById('ownerBar').classList.add('show'); document.body.classList.add('owner-mode'); try{localStorage.setItem('lme-blog-edit','1');}catch(e){} }
  if(/(^|[#&?])rediger/.test(location.hash+location.search)) revealOwner();
  try{ if(localStorage.getItem('lme-blog-edit')==='1'||localStorage.getItem('lme-edit')==='1') revealOwner(); }catch(e){}
  document.addEventListener('keydown',function(e){ if((e.ctrlKey||e.metaKey)&&e.shiftKey&&(e.key==='E'||e.key==='e')) revealOwner(); });
  // Mobil: reveal med en gang naar #rediger legges til, uten aa laste siden paa nytt.
  window.addEventListener('hashchange',function(){ if(/rediger/.test(location.hash)) revealOwner(); });
  // Mobilvennlig: trykk raskt fem ganger paa "Blogg"-overskriften for aa slaa paa redigering.
  (function(){
    var h=document.querySelector('.hero h1'); if(!h) return;
    var taps=0, last=0;
    h.style.cursor='pointer';
    h.addEventListener('click',function(){
      var now=Date.now();
      if(now-last>1500) taps=0;
      last=now; taps++;
      if(taps>=5){ taps=0; revealOwner(); }
    });
  })();

  applyStatic(); load();
})();
</script>
<script src="/js/lme-visibility.js" defer></script>
<script src="/js/lme-account.js?v=7" defer></script>
<script src="/js/renate-widget.js?v=3" defer></script>
</body>
</html>
