<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukekalender — Little Montessori Explorers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cerise:#E91E89;--pink:#F5A8B8;--soft:#F8D7DA;--ink:#2a1e2e;--lime:#A4D233;--sky:#3FA9F5;--sun:#F7C72E;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sasson Montessori','Playpen Sans',system-ui,sans-serif;color:var(--ink);background:#faf6f7;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:13px 20px;background:#fff;box-shadow:0 2px 10px rgba(180,120,140,.12);position:sticky;top:0;z-index:5;}
  .bar .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cerise);text-decoration:none;font-size:15px;}
  .bar .brand img{width:32px;height:32px;object-fit:contain;}
  .bar .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
  .btn{border:0;border-radius:999px;padding:10px 18px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;font-size:14px;white-space:nowrap;}
  .btn-print{background:var(--cerise);color:#fff;box-shadow:0 6px 16px rgba(233,30,137,.35);}
  .btn-back{background:#fff;color:var(--ink);border:1px solid #eedce2;}
  .sheet{max-width:820px;margin:22px auto;background:#fff;padding:30px;border-radius:14px;box-shadow:0 10px 30px rgba(180,120,140,.14);}
  .sheet h1{font-size:27px;line-height:1.1;margin-bottom:6px;}
  .sheet .sub{color:#9a7b85;font-size:13.5px;margin-bottom:22px;}
  .doc-foot{margin-top:24px;text-align:center;color:#c2a7b0;font-size:11px;letter-spacing:.04em;}
  .wk{display:grid;grid-template-columns:max-content 1fr;border:2px solid #F1DDE2;border-radius:12px;overflow:hidden;}
.wk .day{background:linear-gradient(135deg,#FCEFF2,#F8DBE1);font-weight:700;color:#C13D6A;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid #F1DDE2;min-height:64px;white-space:nowrap;}
.wk .lines{border-bottom:1px solid #F1DDE2;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;gap:14px;}
.wk .lines .ln{border-bottom:1.5px dashed #E7D3D9;height:0;}
.wk > div:nth-last-child(-n+2){border-bottom:0;}
  @media print{
    .bar{display:none !important;}
    body{background:#fff;}
    .sheet{box-shadow:none;border:0;margin:0;max-width:100%;border-radius:0;padding:0;}
    @page{size:A4;margin:14mm;}
  }

  /* Laast fontregel: Sasson Montessori paa alt unntatt overskrifter */
  h1,h2,h3,h4,h5,h6{font-family:'Playpen Sans',system-ui,sans-serif;}
</style>
</head>
<body>
  <div class="bar">
    <a class="brand" href="/biblioteket"><img src="/images/lme-logo.png" alt="LME">Little Montessori Explorers</a>
    <div class="actions">
      <button class="btn" id="lme-print-lang" type="button" style="background:#FCEFF2;color:#C13D6A;">🇬🇧 English</button>
      <a class="btn btn-back" href="/biblioteket" data-no="‹ Biblioteket" data-en="‹ Library">‹ Biblioteket</a>
      <button class="btn btn-print" onclick="window.print()" data-no="⬇ Lagre som PDF" data-en="⬇ Save as PDF">⬇ Lagre som PDF</button>
    </div>
  </div>
  <div class="sheet">
    <h1 data-no="Vår uke" data-en="Our week">Vår uke</h1>
    <div class="sub" data-no="En rolig, visuell ukeplan for hjemmet eller klasserommet. Heng den opp i barnets høyde og fyll inn sammen." data-en="A calm, visual weekly plan for home or the classroom. Hang it up at the child's height and fill it in together.">En rolig, visuell ukeplan for hjemmet eller klasserommet. Heng den opp i barnets høyde og fyll inn sammen.</div>
<div class="wk"><div class="day" data-no="Mandag" data-en="Monday">Mandag</div><div class="lines"><div class="ln"></div><div class="ln"></div></div><div class="day" data-no="Tirsdag" data-en="Tuesday">Tirsdag</div><div class="lines"><div class="ln"></div><div class="ln"></div></div><div class="day" data-no="Onsdag" data-en="Wednesday">Onsdag</div><div class="lines"><div class="ln"></div><div class="ln"></div></div><div class="day" data-no="Torsdag" data-en="Thursday">Torsdag</div><div class="lines"><div class="ln"></div><div class="ln"></div></div><div class="day" data-no="Fredag" data-en="Friday">Fredag</div><div class="lines"><div class="ln"></div><div class="ln"></div></div><div class="day" data-no="Lørdag" data-en="Saturday">Lørdag</div><div class="lines"><div class="ln"></div><div class="ln"></div></div><div class="day" data-no="Søndag" data-en="Sunday">Søndag</div><div class="lines"><div class="ln"></div><div class="ln"></div></div></div>
    <div class="doc-foot">Little Montessori Explorers · lmexplorers.com</div>
  </div>

<script>
(function(){
  function apply(lang){
    window.__lmeLang=lang;
    document.querySelectorAll('[data-no][data-en]').forEach(function(el){
      el.innerHTML = (lang==='en') ? el.getAttribute('data-en') : el.getAttribute('data-no');
    });
    document.documentElement.lang=lang;
    var b=document.getElementById('lme-print-lang');
    if(b) b.textContent = (lang==='en') ? '🇳🇴 Norsk' : '🇬🇧 English';
    try{localStorage.setItem('lme_lang',lang);}catch(e){}
  }
  var saved='no';try{saved=localStorage.getItem('lme_lang')||'no';}catch(e){}
  var btn=document.getElementById('lme-print-lang');
  if(btn) btn.addEventListener('click',function(){apply(window.__lmeLang==='en'?'no':'en');});
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){apply(saved);});
  else apply(saved);
})();
</script>
<script src="/js/lme-visibility.js" defer></script>
<script src="/js/lme-account.js?v=6" defer></script>
<script src="/js/renate-widget.js?v=3" defer></script>
</body>
</html>
