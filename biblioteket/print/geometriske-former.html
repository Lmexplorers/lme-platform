<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometriske former — Little Montessori Explorers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cerise:#E91E89;--pink:#F5A8B8;--soft:#F8D7DA;--ink:#2a1e2e;--lime:#A4D233;--sky:#3FA9F5;--sun:#F7C72E;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sasson Montessori','Playpen Sans',system-ui,sans-serif;color:var(--ink);background:#faf6f7;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:13px 20px;background:#fff;box-shadow:0 2px 10px rgba(180,120,140,.12);position:sticky;top:0;z-index:5;}
  .bar .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cerise);text-decoration:none;font-size:15px;}
  .bar .brand img{width:32px;height:32px;object-fit:contain;}
  .bar .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
  .btn{border:0;border-radius:999px;padding:10px 18px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;font-size:14px;white-space:nowrap;}
  .btn-print{background:var(--cerise);color:#fff;box-shadow:0 6px 16px rgba(233,30,137,.35);}
  .btn-back{background:#fff;color:var(--ink);border:1px solid #eedce2;}
  .sheet{max-width:820px;margin:22px auto;background:#fff;padding:30px;border-radius:14px;box-shadow:0 10px 30px rgba(180,120,140,.14);}
  .sheet h1{font-size:27px;line-height:1.1;margin-bottom:6px;}
  .sheet .sub{color:#9a7b85;font-size:13.5px;margin-bottom:22px;}
  .doc-foot{margin-top:24px;text-align:center;color:#c2a7b0;font-size:11px;letter-spacing:.04em;}
  .shapes{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.shape{border:2px dashed #E7C3CD;border-radius:14px;padding:14px;text-align:center;}
.shape svg{width:84px;height:84px;}
.shape .lbl{margin-top:8px;font-weight:600;font-size:15px;}
.shape .en{color:#b59aa3;font-size:12px;}
  @media print{
    .bar{display:none !important;}
    body{background:#fff;}
    .sheet{box-shadow:none;border:0;margin:0;max-width:100%;border-radius:0;padding:0;}
    @page{size:A4;margin:14mm;}
  }

  /* Laast fontregel: Sasson Montessori paa alt unntatt overskrifter */
  h1,h2,h3,h4,h5,h6{font-family:'Playpen Sans',system-ui,sans-serif;}
</style>
</head>
<body>
  <div class="bar">
    <a class="brand" href="/biblioteket"><img src="/images/lme-logo.png" alt="LME">Little Montessori Explorers</a>
    <div class="actions">
      <button class="btn" id="lme-print-lang" type="button" style="background:#FCEFF2;color:#C13D6A;">🇬🇧 English</button>
      <a class="btn btn-back" href="/biblioteket" data-no="‹ Biblioteket" data-en="‹ Library">‹ Biblioteket</a>
      <button class="btn btn-print" onclick="window.print()" data-no="⬇ Lagre som PDF" data-en="⬇ Save as PDF">⬇ Lagre som PDF</button>
    </div>
  </div>
  <div class="sheet">
    <h1 data-no="Geometriske former" data-en="Geometric shapes">Geometriske former</h1>
    <div class="sub" data-no="Ni grunnformer med norske navn. Klipp ut og bruk til å kjenne igjen, sortere og benevne former i rommet." data-en="Nine basic shapes with Norwegian names. Cut out and use to recognise, sort and name shapes in the room.">Ni grunnformer med norske navn. Klipp ut og bruk til å kjenne igjen, sortere og benevne former i rommet.</div>
<div class="shapes"><div class="shape"><svg viewBox="0 0 84 88"><circle cx="42" cy="44" r="34" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Sirkel" data-en="Circle">Sirkel</div></div><div class="shape"><svg viewBox="0 0 84 88"><rect x="10" y="12" width="64" height="64" rx="3" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Kvadrat" data-en="Square">Kvadrat</div></div><div class="shape"><svg viewBox="0 0 84 88"><polygon points="42.0,10.0 71.4,61.0 12.6,61.0" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Trekant" data-en="Triangle">Trekant</div></div><div class="shape"><svg viewBox="0 0 84 88"><rect x="6" y="22" width="72" height="44" rx="3" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Rektangel" data-en="Rectangle">Rektangel</div></div><div class="shape"><svg viewBox="0 0 84 88"><ellipse cx="42" cy="44" rx="36" ry="24" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Oval" data-en="Oval">Oval</div></div><div class="shape"><svg viewBox="0 0 84 88"><polygon points="42.0,10.0 74.3,33.5 62.0,71.5 22.0,71.5 9.7,33.5" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Femkant" data-en="Pentagon">Femkant</div></div><div class="shape"><svg viewBox="0 0 84 88"><polygon points="42.0,10.0 71.4,27.0 71.4,61.0 42.0,78.0 12.6,61.0 12.6,27.0" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Sekskant" data-en="Hexagon">Sekskant</div></div><div class="shape"><svg viewBox="0 0 84 88"><polygon points="42.0,10.0 66.0,20.0 76.0,44.0 66.0,68.0 42.0,78.0 18.0,68.0 8.0,44.0 18.0,20.0" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Åttekant" data-en="Octagon">Åttekant</div></div><div class="shape"><svg viewBox="0 0 84 88"><polygon points="42.0,10.0 50.8,31.9 74.3,33.5 56.3,48.6 62.0,71.5 42.0,59.0 22.0,71.5 27.7,48.6 9.7,33.5 33.2,31.9" fill="#FDE7E0" stroke="#E91E89" stroke-width="2.5"/></svg><div class="lbl" data-no="Stjerne" data-en="Star">Stjerne</div></div></div>
    <div class="doc-foot">Little Montessori Explorers · lmexplorers.com</div>
  </div>

<script>
(function(){
  function apply(lang){
    window.__lmeLang=lang;
    document.querySelectorAll('[data-no][data-en]').forEach(function(el){
      el.innerHTML = (lang==='en') ? el.getAttribute('data-en') : el.getAttribute('data-no');
    });
    document.documentElement.lang=lang;
    var b=document.getElementById('lme-print-lang');
    if(b) b.textContent = (lang==='en') ? '🇳🇴 Norsk' : '🇬🇧 English';
    try{localStorage.setItem('lme_lang',lang);}catch(e){}
  }
  var saved='no';try{saved=localStorage.getItem('lme_lang')||'no';}catch(e){}
  var btn=document.getElementById('lme-print-lang');
  if(btn) btn.addEventListener('click',function(){apply(window.__lmeLang==='en'?'no':'en');});
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){apply(saved);});
  else apply(saved);
})();
</script>
<script src="/js/lme-visibility.js" defer></script>
<script src="/js/lme-account.js?v=5" defer></script>
<script src="/js/renate-widget.js?v=3" defer></script>
</body>
</html>
