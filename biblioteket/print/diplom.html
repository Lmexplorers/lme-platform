<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diplom — Little Montessori Explorers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:'Sasson Montessori';src:url('/fonts/SassoonMontessori.woff2') format('woff2'),url('/fonts/SassoonMontessori.ttf') format('truetype');font-weight:normal;font-style:normal;font-display:swap;}
  :root{--cerise:#E91E89;--pink:#F5A8B8;--soft:#F8D7DA;--ink:#2a1e2e;--lime:#A4D233;--sky:#3FA9F5;--sun:#F7C72E;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sasson Montessori','Playpen Sans',system-ui,sans-serif;color:var(--ink);background:#faf6f7;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 20px;background:#fff;box-shadow:0 2px 10px rgba(180,120,140,.12);position:sticky;top:0;z-index:5;}
  .bar .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cerise);text-decoration:none;font-size:15px;}
  .bar .brand img{width:32px;height:32px;object-fit:contain;}
  .bar .actions{display:flex;gap:10px;}
  .btn{border:0;border-radius:999px;padding:10px 18px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;font-size:14px;}
  .btn-print{background:var(--cerise);color:#fff;box-shadow:0 6px 16px rgba(233,30,137,.35);}
  .btn-back{background:#fff;color:var(--ink);border:1px solid #eedce2;}
  .sheet{max-width:820px;margin:22px auto;background:#fff;padding:30px;border-radius:14px;box-shadow:0 10px 30px rgba(180,120,140,.14);}
  .doc-foot{margin-top:18px;text-align:center;color:#c2a7b0;font-size:11px;letter-spacing:.04em;}
  .cert{border:3px solid var(--cerise);border-radius:18px;padding:40px 36px;text-align:center;position:relative;background:radial-gradient(circle at top,#FFF6FA,#fff);}
  .cert::before{content:"";position:absolute;inset:9px;border:1.5px solid #F3C6D7;border-radius:12px;pointer-events:none;}
  .cert .star{font-size:34px;}
  .cert h1{font-size:40px;color:var(--cerise);letter-spacing:.04em;margin:6px 0 4px;}
  .cert .pre{font-size:14px;color:#9a7b85;margin-bottom:18px;}
  .cert .name{border-bottom:2px solid #E7C3CD;max-width:440px;margin:0 auto 6px;height:46px;}
  .cert .nlabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#b59aa3;margin-bottom:22px;}
  .cert .for{font-size:15px;color:var(--ink);margin-bottom:6px;}
  .cert .ach{border-bottom:1.5px solid #E7C3CD;max-width:380px;margin:0 auto 30px;height:30px;}
  .cert .row{display:flex;justify-content:space-between;gap:30px;max-width:480px;margin:0 auto;}
  .cert .row .col{flex:1;}
  .cert .row .line{border-bottom:1.5px solid #E7C3CD;height:24px;margin-bottom:5px;}
  .cert .row small{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#b59aa3;}
  @media print{
    .bar{display:none !important;}
    body{background:#fff;}
    .sheet{box-shadow:none;border:0;margin:0;max-width:100%;border-radius:0;padding:0;}
    @page{size:A4 landscape;margin:14mm;}
  }
  h1,h2,h3,h4,h5,h6{font-family:'Playpen Sans',system-ui,sans-serif;}
</style>
</head>
<body>
  <div class="bar">
    <a class="brand" href="/biblioteket"><img src="/images/lme-logo.png" alt="LME">Little Montessori Explorers</a>
    <div class="actions">
      <a class="btn btn-back" href="/biblioteket">‹ Biblioteket</a>
      <button class="btn btn-print" onclick="window.print()">⬇ Lagre som PDF</button>
    </div>
  </div>
  <div class="sheet">
    <div class="cert">
      <div class="star">⭐</div>
      <h1>Diplom</h1>
      <div class="pre">Dette diplomet tildeles</div>
      <div class="name"></div>
      <div class="nlabel">navn</div>
      <div class="for">for</div>
      <div class="ach"></div>
      <div class="row">
        <div class="col"><div class="line"></div><small>dato</small></div>
        <div class="col"><div class="line"></div><small>signatur</small></div>
      </div>
    </div>
    <div class="doc-foot">Little Montessori Explorers · lmexplorers.com</div>
  </div>
</body>
</html>
