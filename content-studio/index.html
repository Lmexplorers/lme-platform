<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LME Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
@font-face{font-family:'Sasson Montessori';src:url('/fonts/SassoonMontessori.woff2') format('woff2'),url('/fonts/SassoonMontessori.ttf') format('truetype');font-weight:normal;font-style:normal;font-display:swap;}

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Sasson Montessori';
    min-height: 100vh;
    background: linear-gradient(135deg, #FCE4EE 0%, #FFFBEF 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  .flower { font-size: 56px; margin-bottom: 16px; }
  h1 {
    font-family: 'Playpen Sans';
    font-size: 40px;
    color: #F02478;
    margin-bottom: 8px;
    font-weight: 900;
  }
  .tagline {
    font-size: 18px;
    color: #6B6470;
    margin-bottom: 40px;
    font-style: italic;
  }
  .choose {
    font-size: 14px;
    color: #6B6470;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .lang-btn {
    display: block;
    width: 100%;
    padding: 22px 24px;
    margin-bottom: 16px;
    background: #fff;
    border: 2px solid #E8E0E5;
    border-radius: 16px;
    color: #F02478;
    font-family: 'Sasson Montessori';
    font-size: 18px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(240,36,120,.08);
  }
  .lang-btn:hover {
    background: linear-gradient(120deg, #F02478 0%, #D9A500 100%);
    color: #fff;
    border-color: #F02478;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(240,36,120,.25);
  }
  .lang-btn .flag { font-size: 28px; margin-right: 12px; vertical-align: middle; }
  .footer {
    margin-top: 40px;
    font-size: 13px;
    color: #6B6470;
  }
  .footer a { color: #F02478; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
  <div class="container">
    <div class="flower">🌸</div>
    <h1>LME Content Studio</h1>
    <p class="tagline">AI-powered content for creators</p>
    
    <p class="choose">Choose your language · Velg språk</p>
    
    <a href="/en/" class="lang-btn">
      <span class="flag">🇬🇧</span> English
    </a>
    
    <a href="/no/" class="lang-btn">
      <span class="flag">🇳🇴</span> Norsk
    </a>
    
    <p class="footer">
      Visit <a href="https://lmexplorers.com">lmexplorers.com</a>
    </p>
  </div>
</body>
</html>
